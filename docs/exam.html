<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KakaoCloud Essential Basic — 모의고사</title>
<style>
  :root {
    --kakao-yellow: #FEE500;
    --kakao-brown: #3C1E1E;
    --kakao-dark: #1A1A1A;
    --correct: #22c55e;
    --wrong: #ef4444;
    --neutral: #6b7280;
    --bg: #f8f9fa;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --subtext: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--kakao-dark);
    color: #fff;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
  }
  .header-logo span.badge {
    background: var(--kakao-yellow);
    color: var(--kakao-brown);
    font-size: 11px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 8px;
    padding: 6px 14px;
  }
  .timer-icon { font-size: 16px; }
  #timer {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  #timer.warning { color: #fbbf24; }
  #timer.danger  { color: #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ─── PROGRESS BAR ─── */
  .progress-bar-wrap {
    background: rgba(255,255,255,.12);
    height: 3px;
    position: sticky;
    top: 56px;
    z-index: 99;
  }
  #progress-bar {
    height: 3px;
    background: var(--kakao-yellow);
    width: 0%;
    transition: width .3s;
  }

  /* ─── LAYOUT ─── */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ─── START SCREEN ─── */
  #start-screen {
    text-align: center;
    padding: 60px 20px;
  }
  .start-logo {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .start-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .start-subtitle {
    color: var(--subtext);
    font-size: 15px;
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 480px;
    margin: 0 auto 40px;
  }
  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 12px;
    text-align: center;
  }
  .info-card .icon { font-size: 28px; margin-bottom: 8px; }
  .info-card .value { font-size: 22px; font-weight: 800; color: #111; }
  .info-card .label { font-size: 12px; color: var(--subtext); margin-top: 2px; }
  .btn-start {
    background: var(--kakao-yellow);
    color: var(--kakao-brown);
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 800;
    padding: 16px 48px;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    box-shadow: 0 4px 12px rgba(254,229,0,.4);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(254,229,0,.5); }
  .btn-start:active { transform: translateY(0); }

  /* ─── EXAM SCREEN ─── */
  #exam-screen { display: none; }

  /* Question navigator */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .nav-btn {
    aspect-ratio: 1;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: #f3f4f6;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover { background: #e5e7eb; }
  .nav-btn.answered { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
  .nav-btn.current  { background: var(--kakao-yellow); border-color: #d4a900; color: var(--kakao-brown); }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .q-num {
    background: var(--kakao-yellow);
    color: var(--kakao-brown);
    font-size: 13px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .q-chapter {
    background: #f3f4f6;
    color: #374151;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid #e5e7eb;
  }
  .diff-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .diff-1 { background: #22c55e; }
  .diff-2 { background: #f59e0b; }
  .diff-3 { background: #ef4444; }
  .diff-label { font-size: 11px; color: var(--subtext); }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.7;
    margin-bottom: 24px;
    word-break: keep-all;
  }
  .q-text strong { color: #1d4ed8; }
  .q-text code { background:#f3f4f6; padding:1px 5px; border-radius:4px; font-family:monospace; font-size:14px; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
    font-size: 15px;
    line-height: 1.5;
  }
  .choice-label:hover { border-color: #93c5fd; background: #eff6ff; }
  .choice-label.selected { border-color: #3b82f6; background: #eff6ff; }
  .choice-label input { display: none; }
  .choice-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #f3f4f6;
    border: 2px solid #d1d5db;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    margin-top: 1px;
    transition: all .15s;
  }
  .choice-label.selected .choice-letter {
    background: #3b82f6;
    border-color: #3b82f6;
    color: #fff;
  }

  /* Answer reveal styles */
  .choice-label.correct { border-color: var(--correct); background: #f0fdf4; }
  .choice-label.correct .choice-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .choice-label.wrong-pick { border-color: var(--wrong); background: #fef2f2; }
  .choice-label.wrong-pick .choice-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

  /* Explanation */
  .explanation-box {
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
  }
  .explanation-box.show { display: block; }
  .exp-header {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .exp-header.correct-header { background: #f0fdf4; color: #15803d; border-bottom: 1px solid #bbf7d0; }
  .exp-header.wrong-header  { background: #fef2f2; color: #b91c1c; border-bottom: 1px solid #fecaca; }
  .exp-body {
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.7;
    background: #fff;
    color: #374151;
  }
  .exp-body strong { color: #1d4ed8; }
  .exp-body code { background:#f3f4f6; padding:1px 5px; border-radius:4px; font-family:monospace; font-size:13px; }
  .wrong-pts {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #f3f4f6;
    font-size: 13px;
    color: #6b7280;
  }
  .wrong-pts strong { color: #374151; }

  /* Nav buttons */
  .nav-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-secondary {
    background: #f3f4f6;
    color: #374151;
  }
  .btn-secondary:hover { background: #e5e7eb; }
  .btn-primary {
    background: var(--kakao-yellow);
    color: var(--kakao-brown);
    box-shadow: 0 2px 8px rgba(254,229,0,.35);
  }
  .btn-primary:hover { filter: brightness(.96); }
  .btn-danger {
    background: #fef2f2;
    color: #b91c1c;
    border: 1px solid #fecaca;
  }
  .btn-danger:hover { background: #fee2e2; }

  /* Answered count */
  .answered-count {
    font-size: 13px;
    color: var(--subtext);
    text-align: center;
    flex: 1;
  }
  .answered-count strong { color: var(--text); }

  /* ─── RESULT SCREEN ─── */
  #result-screen { display: none; }
  .result-hero {
    text-align: center;
    padding: 40px 20px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 24px;
  }
  .result-emoji { font-size: 56px; margin-bottom: 12px; }
  .result-score {
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-score .denom { font-size: 28px; font-weight: 500; color: var(--subtext); }
  .pass-badge {
    display: inline-block;
    font-size: 15px;
    font-weight: 800;
    padding: 6px 20px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .pass   { background: #f0fdf4; color: #15803d; border: 2px solid #86efac; }
  .fail   { background: #fef2f2; color: #b91c1c; border: 2px solid #fca5a5; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 20px;
  }
  .stat { text-align: center; }
  .stat .sv { font-size: 26px; font-weight: 800; }
  .stat .sl { font-size: 12px; color: var(--subtext); margin-top: 2px; }
  .sv.correct-color { color: var(--correct); }
  .sv.wrong-color { color: var(--wrong); }

  /* Chapter breakdown */
  .chapter-breakdown {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .cb-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }
  .cb-row {
    margin-bottom: 12px;
  }
  .cb-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .cb-name { font-size: 13px; font-weight: 600; }
  .cb-fraction { font-size: 12px; color: var(--subtext); }
  .cb-bar-bg { height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .cb-bar { height: 6px; border-radius: 99px; background: #3b82f6; transition: width .5s; }

  /* Review list */
  .review-section { margin-top: 24px; }
  .review-title {
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .review-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .review-card.wrong-card { border-left: 4px solid var(--wrong); }
  .review-card .rc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .rc-status {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .rc-status.correct { background: #f0fdf4; color: #15803d; }
  .rc-status.wrong   { background: #fef2f2; color: #b91c1c; }
  .rc-qnum { font-size: 12px; color: var(--subtext); }
  .rc-chapter { font-size: 11px; background: #f3f4f6; color: #374151; padding: 2px 8px; border-radius: 999px; }
  .rc-question { font-size: 14px; font-weight: 600; line-height: 1.6; margin-bottom: 10px; }
  .rc-your-ans { font-size: 13px; }
  .rc-your-ans .label { color: var(--subtext); }
  .rc-exp { font-size: 13px; line-height: 1.6; color: #374151; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f3f4f6; }

  .btn-retry {
    display: block;
    width: 100%;
    background: var(--kakao-yellow);
    color: var(--kakao-brown);
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    padding: 18px;
    cursor: pointer;
    margin-top: 32px;
    box-shadow: 0 4px 12px rgba(254,229,0,.4);
    transition: all .15s;
  }
  .btn-retry:hover { filter: brightness(.96); transform: translateY(-1px); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
  .modal p  { font-size: 14px; color: var(--subtext); line-height: 1.6; margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: repeat(3,1fr); }
    .nav-grid  { grid-template-columns: repeat(10,1fr); gap: 4px; }
    .nav-btn   { font-size: 10px; }
    .q-text    { font-size: 15px; }
    .choice-label { font-size: 14px; padding: 12px 14px; }
    .result-score { font-size: 52px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo" style="cursor:pointer" onclick="location.href='index.html'">
    <span class="badge">KC</span>
    KakaoCloud Essential Basic — 모의고사
  </div>
  <div class="timer-wrap" id="timer-wrap" style="display:none">
    <span class="timer-icon">⏱</span>
    <span id="timer">60:00</span>
  </div>
</div>
<div class="progress-bar-wrap"><div id="progress-bar"></div></div>

<!-- ── START SCREEN ── -->
<div class="container" id="start-screen">
  <div class="start-logo">📝</div>
  <div class="start-title">KakaoCloud Essential Basic<br>모의고사</div>
  <div class="start-subtitle">
    카카오클라우드 공식 문서 기반으로 출제된 문제입니다.<br>
    실제 시험과 동일한 환경에서 실력을 점검해 보세요.
  </div>
  <div class="info-grid">
    <div class="info-card">
      <div class="icon">📋</div>
      <div class="value">60</div>
      <div class="label">문제 수</div>
    </div>
    <div class="info-card">
      <div class="icon">⏱</div>
      <div class="value">60분</div>
      <div class="label">제한 시간</div>
    </div>
    <div class="info-card">
      <div class="icon">✅</div>
      <div class="value">70%</div>
      <div class="label">합격 기준</div>
    </div>
  </div>
  <button class="btn-start" onclick="startExam()">시험 시작하기 →</button>
</div>

<!-- ── EXAM SCREEN ── -->
<div class="container" id="exam-screen">
  <!-- Navigator -->
  <div class="nav-grid" id="nav-grid"></div>

  <!-- Question card -->
  <div class="q-card" id="q-card"></div>

  <!-- Actions -->
  <div class="nav-actions">
    <button class="btn btn-secondary" id="btn-prev" onclick="goPrev()">← 이전</button>
    <div class="answered-count">
      <strong id="answered-num">0</strong> / 60 답변 완료
    </div>
    <button class="btn btn-primary" id="btn-next" onclick="goNext()">다음 →</button>
  </div>
  <div style="text-align:center; margin-top:16px">
    <button class="btn btn-danger" onclick="showSubmitModal()">제출하기</button>
  </div>
</div>

<!-- ── RESULT SCREEN ── -->
<div class="container" id="result-screen">
  <div class="result-hero">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-score">
      <span id="res-correct">0</span>
      <span class="denom"> / 60</span>
    </div>
    <div class="pass-badge" id="pass-badge">합격</div>
    <div class="result-stats">
      <div class="stat">
        <div class="sv correct-color" id="res-correct2">0</div>
        <div class="sl">정답</div>
      </div>
      <div class="stat">
        <div class="sv wrong-color" id="res-wrong">0</div>
        <div class="sl">오답</div>
      </div>
      <div class="stat">
        <div class="sv" style="color:#6b7280" id="res-skip">0</div>
        <div class="sl">미응답</div>
      </div>
      <div class="stat">
        <div class="sv" style="color:#3b82f6" id="res-time">—</div>
        <div class="sl">소요 시간</div>
      </div>
    </div>
  </div>

  <div class="chapter-breakdown">
    <div class="cb-title">📊 챕터별 결과</div>
    <div id="cb-rows"></div>
  </div>

  <div class="review-section">
    <div class="review-title">❌ 틀린 문제 해설</div>
    <div id="review-list"></div>
  </div>

  <button class="btn-retry" onclick="location.reload()">🔄 다시 풀기</button>
</div>

<!-- ── SUBMIT MODAL ── -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal">
    <h3>제출하시겠어요?</h3>
    <p id="modal-msg">아직 답하지 않은 문제가 있습니다.<br>제출 후에는 수정할 수 없습니다.</p>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">계속 풀기</button>
      <button class="btn btn-primary" onclick="submitExam()">제출</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"id": "q011", "chapter": "01-cloud-overview", "chapter_name": "클라우드 개요", "topic": "kakaocloud-overview", "difficulty": 2, "question": "카카오클라우드 BCS(Beyond Compute Service)가 현재 제공하는 인스턴스 유형에 **포함되지 않는** 것은?", "choices": [{"label": "A", "text": "컴퓨팅 최적화(Compute optimized)"}, {"label": "B", "text": "메모리 최적화(Memory optimized)"}, {"label": "C", "text": "스토리지 최적화(Storage optimized)"}, {"label": "D", "text": "비디오 트랜스코딩(Video transcoding)"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, BCS 인스턴스 유형으로는 범용(General purpose), 컴퓨팅 최적화(Compute optimized), 메모리 최적화(Memory optimized), 가속 컴퓨팅(Accelerated computing), 비디오 트랜스코딩(Video transcoding) 인스턴스가 있습니다. 스토리지 최적화(Storage optimized)는 현재 BCS 인스턴스 유형으로 제공되지 않습니다.", "wrong_points": "- A: 컴퓨팅 최적화(Compute optimized)는 BCS가 제공하는 5가지 인스턴스 유형 중 하나입니다.\n- B: 메모리 최적화(Memory optimized)는 BCS가 제공하는 5가지 인스턴스 유형 중 하나입니다.\n- D: 비디오 트랜스코딩(Video transcoding)은 BCS가 제공하는 5가지 인스턴스 유형 중 하나로, 카카오클라우드 특화 유형입니다."}, {"id": "q005", "chapter": "05-operations", "chapter_name": "운영 (모니터링/알림)", "topic": "alert-center", "difficulty": 2, "question": "카카오클라우드 Alert Center에서 **Silence** 기능에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "Silence는 알림 정책 자체를 영구 삭제하는 기능이다."}, {"label": "B", "text": "Silence는 원하는 기간 동안 알림을 억제하는 기능이다."}, {"label": "C", "text": "Silence는 특정 사용자에게만 알림이 발송되지 않도록 차단하는 기능이다."}, {"label": "D", "text": "Silence는 알림 수신 채널을 일시적으로 비활성화하는 기능이다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Alert Center의 Silence 기능은 불필요한 알림이 반복적으로 발생할 때 원하는 기간 동안 알림을 억제하는 기능입니다. Silence를 설정하면 해당 기간 동안 알림 정책에 의한 알림 발송이 중단됩니다.", "wrong_points": "- A: Silence는 알림 정책을 영구 삭제하는 것이 아닙니다. 알림 정책은 유지되며, 지정한 기간 동안만 알림 발송이 억제됩니다.\n- C: Silence는 특정 사용자를 대상으로 차단하는 기능이 아닙니다. 알림 정책 자체에 대한 발송을 일시적으로 억제합니다.\n- D: Silence는 수신 채널을 비활성화하는 기능이 아닙니다. 알림 정책에 의한 알림 발송을 일정 기간 억제하는 기능입니다."}, {"id": "q007", "chapter": "02-kakao-services/container-pack", "chapter_name": "Container Pack", "topic": "container-registry", "difficulty": 1, "question": "카카오클라우드 **Container Registry**에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "컨테이너 클러스터를 생성하고 관리하는 서비스로, Kubernetes 엔진을 포함한다."}, {"label": "B", "text": "퍼블릭 이미지만 저장 가능하며, 인터넷을 통해 누구나 이미지를 다운로드할 수 있다."}, {"label": "C", "text": "컨테이너 이미지를 안전하게 저장하고 관리하기 위한 비공개(Private) 이미지 저장소 서비스이다."}, {"label": "D", "text": "컨테이너 이미지를 자동으로 빌드하는 CI/CD 파이프라인 서비스이다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, Container Registry는 컨테이너 이미지를 안전하게 저장하고 관리하기 위한 비공개(Private) 이미지 저장소 서비스입니다. 사용자는 Container Registry에 커스텀 이미지를 저장하고, 이를 Kubernetes Engine 등 컨테이너 서비스와 연동하여 활용할 수 있습니다.", "wrong_points": "- A: 컨테이너 클러스터를 생성하고 관리하는 서비스는 Kubernetes Engine입니다. Container Registry는 이미지 저장소 서비스로 별개의 서비스입니다.\n- B: Container Registry는 비공개(Private) 저장소 서비스입니다. 퍼블릭 이미지만 저장 가능하거나 누구나 다운로드할 수 있다는 설명은 잘못되었습니다.\n- D: Container Registry는 이미지를 자동으로 빌드하는 CI/CD 파이프라인 서비스가 아닙니다. 이미지를 저장하고 관리하는 저장소 서비스입니다."}, {"id": "q006", "chapter": "03-billing", "chapter_name": "과금 및 쿼터", "topic": "billing-model", "difficulty": 1, "question": "카카오클라우드 **IAM(Identity and Access Management) 서비스**의 요금에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "IAM 서비스는 사용자 수에 비례하여 월정액 요금이 부과된다."}, {"label": "B", "text": "IAM 서비스는 API 호출 횟수에 따라 요금이 부과된다."}, {"label": "C", "text": "IAM 서비스는 현재 기본적으로 제공되며 별도의 과금이 발생하지 않는다."}, {"label": "D", "text": "IAM 서비스는 리전별로 별도로 과금되는 리전 서비스이다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, IAM 서비스는 모든 리전에서 공통적으로 제공되는 글로벌 서비스로, 현재 기본적으로 제공되며 별도의 과금은 발생하지 않습니다. 다만, 향후 API별 과금 항목이 추가될 수 있다고 안내되어 있습니다.", "wrong_points": "- A: IAM 서비스는 사용자 수에 따른 월정액 과금이 발생하지 않습니다. 현재 별도의 과금이 없습니다.\n- B: IAM 서비스는 현재 API 호출 횟수에 따른 과금이 없습니다. 향후 API별 과금 항목이 추가될 수 있다고 언급되어 있지만, 현재는 무료입니다.\n- D: IAM은 리전별로 별도 과금되는 리전 서비스가 아니라, 모든 리전에서 공통으로 제공되는 글로벌 서비스입니다."}, {"id": "q002", "chapter": "02-kakao-services/bss", "chapter_name": "BSS (스토리지)", "topic": "object-storage", "difficulty": 1, "question": "카카오클라우드 Object Storage에서 제공하는 버킷 유형과 각 유형의 특징을 올바르게 연결한 것은?", "choices": [{"label": "A", "text": "Standard 버킷: 접근 빈도가 낮은 데이터를 위한 저비용 스토리지 / Cool 버킷: 자주 접근하는 데이터에 적합한 고가용성 스토리지"}, {"label": "B", "text": "Standard 버킷: 높은 내구성과 가용성으로 자주 접근하는 데이터 저장에 적합 / Cool 버킷: 접근 빈도가 낮은 데이터를 위한 저비용 효율형 스토리지"}, {"label": "C", "text": "Standard 버킷: 빅데이터 분석 전용 / Cool 버킷: 백업 및 아카이빙 전용"}, {"label": "D", "text": "Standard 버킷: 객체 개수 제한 있음 / Cool 버킷: 객체 개수 제한 없음"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Object Storage의 버킷은 Standard 유형과 Cool 유형을 제공합니다. Standard 버킷은 높은 내구성과 가용성을 갖춰 자주 접근하는 데이터 저장에 적합하고, Cool 버킷은 접근 빈도가 낮은 데이터를 위한 저비용 효율형 스토리지입니다.", "wrong_points": "- A: Standard와 Cool의 설명이 반대로 뒤바뀐 오답입니다. Standard는 자주 접근하는 데이터에, Cool은 접근 빈도가 낮은 데이터에 적합합니다.\n- C: Standard 버킷이 빅데이터 분석 전용이거나 Cool 버킷이 백업·아카이빙 전용이라는 내용은 공식 문서에 없습니다. 각 버킷 유형은 접근 빈도에 따라 구분됩니다.\n- D: Object Storage에서는 두 유형 모두 버킷 용량과 객체 수에 제한이 없습니다. 객체 개수 제한으로 버킷 유형을 구분하지 않습니다."}, {"id": "q001", "chapter": "03-billing", "chapter_name": "과금 및 쿼터", "topic": "billing-model", "difficulty": 2, "question": "카카오클라우드 Virtual Machine 인스턴스의 상태별 과금에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "Stopped 상태는 인스턴스가 정지되어 있으므로 과금이 발생하지 않는다."}, {"label": "B", "text": "Shelved_offloaded 상태는 하이퍼바이저 리소스를 반납하므로 과금이 발생하지 않는다."}, {"label": "C", "text": "Active 상태와 Stopped 상태 모두 과금이 발생하지 않는다."}, {"label": "D", "text": "Shelved_offloaded 상태와 Stopped 상태 모두 동일하게 과금이 발생한다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Shelved_offloaded 상태는 인스턴스가 종료되어 하이퍼바이저 상에 할당했던 리소스를 반납한 상태로 과금이 발생하지 않습니다. 반면 Stopped 상태는 인스턴스가 정지되었으나 하이퍼바이저 상에 리소스는 그대로 할당된 상태이므로 과금이 계속 발생합니다.", "wrong_points": "- A: Stopped 상태는 인스턴스가 정지되어 있지만 하이퍼바이저 상에 리소스가 그대로 할당되어 있으므로 과금이 발생합니다. 과금이 발생하지 않는 정지 상태는 Shelved_offloaded입니다.\n- C: Active 상태는 과금이 발생하고, Stopped 상태도 과금이 발생합니다. 두 상태 모두 과금이 발생하지 않는다는 설명은 잘못되었습니다.\n- D: Stopped 상태는 과금이 발생하지만, Shelved_offloaded 상태는 하이퍼바이저 리소스를 반납하여 과금이 발생하지 않습니다. 두 상태의 과금 방식이 다릅니다."}, {"id": "q005", "chapter": "02-kakao-services/bss", "chapter_name": "BSS (스토리지)", "topic": "storage-comparison", "difficulty": 2, "question": "카카오클라우드 **File Storage**와 **Object Storage**의 차이점에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "File Storage는 Key-value 형태의 객체를 저장하며, Object Storage는 계층적 파일 시스템을 제공한다."}, {"label": "B", "text": "File Storage는 파일 공유·협업용으로 NFS 프로토콜을 사용하고, Object Storage는 대용량 비정형 데이터를 Key-value 형태로 저장한다."}, {"label": "C", "text": "File Storage와 Object Storage는 모두 여러 사용자가 동시에 파일을 읽고 쓸 수 있는 파일 공유 환경을 제공한다."}, {"label": "D", "text": "Object Storage는 Block Storage 대비 빠른 쓰기 성능을 제공하여 데이터베이스 워크로드에 적합하다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, File Storage는 NFS(Network File System) 프로토콜을 사용하여 다수의 서버와 애플리케이션 간에 데이터를 저장하고 공유하는 서비스로, 파일 공유 환경을 제공하는 공유 파일 시스템·협업용으로 사용됩니다. Object Storage는 주로 대용량 및 비정형 데이터를 Key-value 형태로 저장하는 서비스로, 파일 공유 환경은 별도로 제공하지 않습니다.", "wrong_points": "- A: File Storage와 Object Storage의 특징이 뒤바뀐 오답입니다. Key-value는 Object Storage, 파일 시스템은 File Storage의 특징입니다.\n- C: Object Storage는 파일 공유 및 협업을 위한 별도의 파일 공유 환경을 제공하지 않습니다. 공유 파일 시스템은 File Storage의 특징입니다.\n- D: Object Storage는 데이터베이스와 같은 빠른 쓰기 성능이 필요한 워크로드가 아닌, 대용량 비정형 데이터 저장에 최적화된 서비스입니다."}, {"id": "q008", "chapter": "07-complex", "chapter_name": "복합 시나리오", "topic": "api-preparation", "difficulty": 2, "question": "카카오클라우드 **API 인증 토큰 발급**의 선행 조건으로 옳은 것은?", "choices": [{"label": "A", "text": "VPC 생성이 완료되어 있어야 한다."}, {"label": "B", "text": "IAM 액세스 키가 발급되어 있어야 한다."}, {"label": "C", "text": "프로젝트 관리자(Admin) 역할이 있어야 한다."}, {"label": "D", "text": "Object Storage 버킷이 생성되어 있어야 한다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, API 인증 토큰을 발급받으려면 **IAM 액세스 키 발급이 선행**되어야 합니다. IAM 액세스 키(IAM 액세스 키 ID와 보안 액세스 키)는 API 인증 토큰 발급을 위해 필요한 자격 증명 정보이며, IAM 액세스 키의 권한은 선택한 프로젝트의 IAM 역할에 따라 결정됩니다.", "wrong_points": "- A: VPC 생성은 API 인증 토큰 발급의 선행 조건이 아닙니다. VPC는 네트워크 리소스 사용을 위해 필요하지만 토큰 발급 자체와는 무관합니다.\n- C: 프로젝트 관리자 역할이 없어도 API 인증 토큰을 발급받을 수 있습니다. 프로젝트 멤버나 다른 역할을 가진 사용자도 IAM 액세스 키만 있으면 토큰을 발급받을 수 있습니다.\n- D: Object Storage 버킷 생성은 API 인증 토큰 발급의 선행 조건이 아닙니다."}, {"id": "q007", "chapter": "07-complex", "chapter_name": "복합 시나리오", "topic": "api-preparation", "difficulty": 3, "question": "카카오클라우드 API 인증 토큰 발급 후, 해당 사용자의 **프로젝트 역할이 관리자(Admin)에서 멤버(Member)로 변경**된 경우 발생하는 동작으로 옳은 것은?", "choices": [{"label": "A", "text": "기존 토큰은 즉시 만료되며 재발급해야 한다."}, {"label": "B", "text": "기존 토큰은 유효 기간(12시간)까지 관리자 권한을 유지한다."}, {"label": "C", "text": "기존 토큰은 변경된 멤버(Member) 권한을 상속받아 계속 유효하다."}, {"label": "D", "text": "역할 변경은 토큰의 권한에 영향을 미치지 않는다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, 소속 프로젝트 역할이 변경된 경우, 기존 토큰은 즉시 만료되지 않고 **토큰 발급 시점의 역할과 현재 역할을 비교하여 일치하는 역할 또는 권한만 상속**받습니다. 따라서 관리자(Admin)에서 멤버(Member)로 변경된 경우, 기존 토큰은 멤버 권한으로 계속 유효합니다.", "wrong_points": "- A: 역할 변경은 토큰을 즉시 만료시키지 않습니다. 토큰의 즉시 만료(권한 만료)는 프로젝트에서 내보내기(역할 삭제)되거나, IAM 액세스 키를 직접 삭제한 경우에 발생합니다.\n- B: 역할이 낮아진 경우 기존의 높은 권한(관리자)을 유지하지 않습니다. 변경된 낮은 권한(멤버)을 상속받습니다.\n- D: 역할 변경은 토큰의 권한에 영향을 미칩니다. 변경된 역할에 따라 토큰 권한이 조정됩니다."}, {"id": "q007", "chapter": "02-kakao-services/data-store", "chapter_name": "Data Store", "topic": "memstore", "difficulty": 1, "question": "카카오클라우드 **MemStore**에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "MySQL을 기반으로 한 완전 관리형 관계형 데이터베이스 서비스이다."}, {"label": "B", "text": "데이터를 디스크와 메모리에 함께 저장하여 영속성을 보장하는 데이터베이스 서비스이다."}, {"label": "C", "text": "Redis OSS를 기반으로 하는 완전 관리형 인 메모리 데이터 스토어 서비스이다."}, {"label": "D", "text": "파일 형태로 데이터를 저장하는 완전 관리형 파일 데이터베이스 서비스이다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, MemStore는 서버의 운영 관리 부담을 덜어주고 데이터베이스를 쉽게 사용할 수 있도록 도와주는 완전 관리형 인 메모리 데이터 스토어(in-memory data store) 서비스입니다. MemStore가 제공하는 Redis는 오픈 소스 기반의 Redis OSS 버전으로, 메모리 내에 데이터를 저장하고 빠르게 데이터를 검색하는 NoSQL 데이터베이스 시스템입니다.", "wrong_points": "- A: MySQL을 기반으로 한 관계형 데이터베이스 서비스는 MemStore가 아닌 MySQL 서비스입니다. MemStore는 Redis OSS 기반의 인 메모리 서비스입니다.\n- B: MemStore는 Cache Only 방식으로 디스크를 사용하지 않고 모든 데이터를 메모리에만 저장합니다. 영속성(디스크 저장)을 보장하지 않습니다.\n- D: MemStore는 파일 형태로 데이터를 저장하는 서비스가 아닙니다. 모든 데이터를 메모리에 저장하는 인 메모리 데이터 스토어 서비스입니다."}, {"id": "q005", "chapter": "02-kakao-services/data-store", "chapter_name": "Data Store", "topic": "postgresql", "difficulty": 1, "question": "카카오클라우드 PostgreSQL 인스턴스 그룹의 **기본 포트**로 올바른 것은?", "choices": [{"label": "A", "text": "Primary: 3306, Standby: 3307"}, {"label": "B", "text": "Primary: 5432, Standby: 5433"}, {"label": "C", "text": "Primary: 5433, Standby: 5432"}, {"label": "D", "text": "Primary: 5432, Standby: 5432"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, PostgreSQL 인스턴스 그룹의 기본 포트는 Primary가 5432, Standby가 5433입니다. 생성 시 1024~65535 범위 내에서 원하는 포트를 직접 지정할 수도 있습니다.", "wrong_points": "- A: 3306/3307은 PostgreSQL이 아닌 MySQL의 기본 포트입니다. MySQL Primary: 3306, Standby: 3307이 올바릅니다.\n- C: Primary와 Standby의 포트가 바뀌었습니다. Primary는 5432, Standby는 5433이 올바른 순서입니다.\n- D: Primary와 Standby가 동일한 5432 포트를 사용한다는 설명은 잘못되었습니다. Standby는 별도의 5433 포트를 사용합니다."}, {"id": "q009", "chapter": "05-operations", "chapter_name": "운영 (모니터링/알림)", "topic": "alert-center", "difficulty": 3, "question": "카카오클라우드 Alert Center에서 **network_rx_bytes_persec 메트릭**으로 알림 정책을 설정할 때의 동작으로 옳은 것은?", "choices": [{"label": "A", "text": "알림 정책은 설정 시 지정한 특정 네트워크 인터페이스에만 적용된다."}, {"label": "B", "text": "알림 정책은 인스턴스에 연결된 모든 네트워크 인터페이스에 적용되며, 하나라도 임계치를 초과하면 알림이 발송된다."}, {"label": "C", "text": "알림 정책은 Primary 네트워크 인터페이스에만 적용된다."}, {"label": "D", "text": "다중 NIC 인스턴스에서는 모든 인터페이스의 합산 값이 임계치를 초과해야 알림이 발송된다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, network_rx_bytes_persec 메트릭으로 Alert Center 알림 정책을 설정할 경우, 해당 정책은 모든 네트워크 인터페이스에 적용됩니다. 다중 NIC 인스턴스에서는 연결된 인터페이스 중 하나라도 설정된 임계치를 초과하면 알림이 발송됩니다.", "wrong_points": "- A: 네트워크 알림 정책은 특정 인터페이스에만 적용되지 않습니다. 연결된 모든 네트워크 인터페이스에 적용됩니다.\n- C: 알림 정책은 Primary 인터페이스에만 적용되지 않습니다. 연결된 모든 네트워크 인터페이스에 적용됩니다.\n- D: 알림 발송 조건은 모든 인터페이스의 합산 값이 임계치를 초과하는 것이 아니라, 인터페이스 중 하나라도 임계치를 초과하면 발송됩니다."}, {"id": "q009", "chapter": "02-kakao-services/bns", "chapter_name": "BNS (네트워킹)", "topic": "transit-gateway", "difficulty": 2, "question": "카카오클라우드 Transit Gateway에 대한 설명으로 옳지 **않은** 것은?", "choices": [{"label": "A", "text": "다수의 VPC와 온프레미스 네트워크를 연결하여 중앙 집중식 네트워크를 구성할 수 있다."}, {"label": "B", "text": "다중 AZ 환경을 지원하여 전체 시스템의 가용성을 높이고 빠른 재해복구(DR) 아키텍처를 구현할 수 있다."}, {"label": "C", "text": "Transit Gateway를 사용하면 VPC 간 연결 시 성능 저하 없이 여러 VPC를 유기적으로 연결할 수 있다."}, {"label": "D", "text": "Transit Gateway를 통해 서로 다른 리전 간의 VPC를 직접 연결하는 글로벌 네트워크를 구성할 수 있다."}], "answer": "D", "explanation": "카카오클라우드 공식 문서에 따르면, Transit Gateway는 다수의 VPC와 온프레미스 네트워크를 연결하여 중앙 집중식 네트워크를 구성하고, 다중 AZ 환경을 지원하여 전체 시스템의 가용성을 높이며 빠른 재해복구(DR) 아키텍처 구현을 지원합니다. 그러나 서로 다른 리전 간 VPC를 직접 연결하는 글로벌 네트워크 구성 기능은 공식 문서에서 언급되지 않습니다.", "wrong_points": "- A: Transit Gateway는 다수의 VPC와 온프레미스 네트워크를 연결하는 중앙 집중식 네트워크 허브로, 공식 문서에 명시된 기능입니다.\n- B: Transit Gateway는 다중 AZ 환경을 지원하여 가용성 향상과 재해복구(DR) 아키텍처 구현이 가능합니다. 공식 문서에 명시된 내용입니다.\n- C: Transit Gateway를 사용하면 성능 저하 없이 여러 VPC를 유기적으로 연결하고 데이터 센터 프라이빗 환경과 유사하게 구성할 수 있습니다. 공식 문서에 명시된 내용입니다."}, {"id": "q006", "chapter": "02-kakao-services/bcs", "chapter_name": "BCS (컴퓨팅)", "topic": "vm-overview", "difficulty": 2, "question": "카카오클라우드 VM에서 인스턴스의 **스케일 업(Scale-up)**과 **스케일 아웃(Scale-out)**에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "스케일 업은 새로운 인스턴스를 추가하여 부하를 분산시키고, 스케일 아웃은 기존 인스턴스의 CPU와 메모리를 증가시킨다."}, {"label": "B", "text": "스케일 업은 기존 인스턴스의 리소스(CPU, 메모리 등)를 증가시켜 성능을 향상시키고, 스케일 아웃은 인스턴스 개수를 늘려 부하를 분산시킨다."}, {"label": "C", "text": "스케일 업과 스케일 아웃은 동일한 개념으로, 인스턴스에 리소스를 추가하는 방식이다."}, {"label": "D", "text": "스케일 아웃은 단일 인스턴스의 성능을 향상시키는 반면, 스케일 업은 여러 인스턴스를 병렬로 실행한다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 스케일 업(Scale-up)은 기존 인스턴스의 리소스(CPU, 메모리, 볼륨 등)를 증가시켜 성능을 향상시키는 방식입니다. 반면 스케일 아웃(Scale-out)은 새로운 인스턴스를 추가하여 워크로드를 분산시키는 방식으로, 여러 인스턴스가 병렬로 작업을 처리하므로 성능과 확장성을 높일 수 있습니다.", "wrong_points": "- A: 스케일 업과 스케일 아웃의 정의가 뒤바뀌어 있습니다. 스케일 업은 기존 인스턴스 리소스 증가, 스케일 아웃은 인스턴스 개수 증가입니다.\n- C: 스케일 업과 스케일 아웃은 서로 다른 개념입니다. 스케일 업은 단일 인스턴스의 성능 향상, 스케일 아웃은 인스턴스 수 증가를 통한 부하 분산입니다.\n- D: 스케일 아웃이 병렬 실행이고 스케일 업이 단일 인스턴스 성능 향상이므로 설명이 뒤바뀌어 있습니다."}, {"id": "q012", "chapter": "01-cloud-overview", "chapter_name": "클라우드 개요", "topic": "region-az", "difficulty": 2, "question": "카카오클라우드에서 여러 VPC를 성능 저하 없이 유기적으로 연결하고, 온프레미스 네트워크와 중앙 집중식 네트워크를 구축할 때 사용하는 서비스는?", "choices": [{"label": "A", "text": "VPC Peering"}, {"label": "B", "text": "Load Balancer"}, {"label": "C", "text": "Transit Gateway"}, {"label": "D", "text": "DNS"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, Transit Gateway 서비스를 사용하면 성능 저하 없이 여러 VPC를 유기적으로 연결하고, 데이터 센터에서 사용하는 프라이빗 환경과 유사하게 구성할 수 있습니다. 또한 Transit Gateway는 다수의 VPC 및 온프레미스 네트워크를 연결하여 중앙 집중식 네트워크를 구축할 수 있게 해주며, 다중 AZ 환경을 지원하여 전체 시스템의 가용성을 향상하고 빠른 재해복구(DR) 아키텍처를 구현할 수 있습니다.", "wrong_points": "- A: VPC Peering은 카카오클라우드 공식 문서에서 다수 VPC의 중앙 집중식 연결 수단으로 언급되지 않으며, Transit Gateway가 이 역할을 담당합니다.\n- B: Load Balancer는 트래픽을 여러 인스턴스에 분산하는 서비스로, VPC 간 네트워크 연결과는 다른 역할입니다.\n- D: DNS는 도메인 이름을 IP 주소로 변환하는 서비스로, VPC 간 네트워크 연결 역할을 하지 않습니다."}, {"id": "q010", "chapter": "06-account", "chapter_name": "계정 관리", "topic": "iam-roles", "difficulty": 2, "question": "카카오클라우드 IAM에서 **조직 구성원(Organization Member, Reader)** 역할로 수행할 수 있는 작업으로 옳은 것은?", "choices": [{"label": "A", "text": "조직 내 신규 프로젝트를 생성하고 프로젝트 멤버를 초대할 수 있다."}, {"label": "B", "text": "조직 및 프로젝트 정보를 조회할 수 있지만, 프로젝트 리소스를 직접 생성·수정·삭제할 수 없다."}, {"label": "C", "text": "모든 프로젝트의 리소스에 대한 전체 관리 권한을 가진다."}, {"label": "D", "text": "조직 내 사용자 계정을 생성하고 역할을 부여할 수 있다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 조직 구성원(Organization Member, Reader) 역할은 조직 및 프로젝트 정보를 조회할 수 있는 읽기 전용 권한입니다. 프로젝트 리소스의 생성·수정·삭제 등 관리 작업은 수행할 수 없으며, 조직 관련 관리 작업(신규 프로젝트 생성, 멤버 초대, 사용자 관리 등)도 불가합니다.", "wrong_points": "- A: 신규 프로젝트 생성 및 프로젝트 멤버 초대는 조직 관리자(Admin) 권한이 필요합니다. Reader 역할로는 불가합니다.\n- C: 모든 프로젝트 리소스에 대한 전체 관리 권한은 조직 관리자 역할에 해당합니다. Reader 역할은 조회만 가능합니다.\n- D: 조직 내 사용자 계정 생성 및 역할 부여는 조직 관리자(Admin) 권한이 필요합니다."}, {"id": "q004", "chapter": "02-kakao-services/data-store", "chapter_name": "Data Store", "topic": "mysql", "difficulty": 3, "question": "카카오클라우드 MySQL 인스턴스 상태 중 **Storage-Full(Error)** 상태일 때의 과금 방식으로 옳은 것은?", "choices": [{"label": "A", "text": "과금이 전혀 발생하지 않는다."}, {"label": "B", "text": "스토리지 요금만 청구된다."}, {"label": "C", "text": "인스턴스 요금과 스토리지 요금이 모두 청구된다."}, {"label": "D", "text": "인스턴스 요금만 청구되고 스토리지 요금은 청구되지 않는다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, MySQL 인스턴스가 Storage-Full(Error) 상태(데이터 또는 로그 스토리지 여유 공간이 5GB 이하)일 때는 스토리지 요금만 청구됩니다. 반면 Running, Volume-Extending, Engine-Upgrade, Kernel-Upgrade, OS-Upgrade, Reboot, Resizing, Storage-Full(Warning) 상태에서는 인스턴스 요금과 스토리지 요금이 모두 청구됩니다.", "wrong_points": "- A: Storage-Full(Error) 상태에서도 스토리지 요금은 발생합니다. 과금이 전혀 없는 상태는 Pending, Starting, Error, Terminating, Terminated입니다.\n- C: Storage-Full(Error) 상태에서는 스토리지 요금만 청구됩니다. 인스턴스 요금은 청구되지 않습니다.\n- D: Storage-Full(Error) 상태에서 인스턴스 요금은 청구되지 않고, 스토리지 요금만 청구됩니다. 인스턴스 요금만 청구된다는 설명은 잘못되었습니다."}, {"id": "q008", "chapter": "06-account", "chapter_name": "계정 관리", "topic": "api-token", "difficulty": 3, "question": "카카오클라우드 API 토큰이 **유효 기간(12시간) 이전에 조기 만료**될 수 있는 조건으로 옳은 것을 모두 고른 것은?", "choices": [{"label": "A", "text": "토큰 발급에 사용한 IAM 액세스 키가 삭제된 경우"}, {"label": "B", "text": "토큰을 발급한 사용자가 해당 프로젝트에서 역할이 제거된 경우"}, {"label": "C", "text": "사용자가 다른 프로젝트에 새로운 역할을 추가한 경우"}, {"label": "D", "text": "A와 B 모두"}], "answer": "D", "explanation": "카카오클라우드 공식 문서에 따르면, API 토큰은 기본 유효 기간인 12시간이 지나기 전에도 다음 조건에서 조기 만료됩니다. ① 토큰 발급에 사용한 IAM 액세스 키가 삭제된 경우, ② 토큰을 발급한 사용자가 해당 프로젝트에서 역할이 제거된 경우. 두 조건 모두 토큰의 조기 만료를 유발합니다.", "wrong_points": "- A만: IAM 액세스 키 삭제 시 조기 만료되는 것은 맞지만, 역할 제거 시에도 조기 만료되므로 A만 선택하는 것은 불완전합니다.\n- B만: 역할 제거 시 조기 만료되는 것은 맞지만, 액세스 키 삭제 시에도 조기 만료되므로 B만 선택하는 것은 불완전합니다.\n- C: 다른 프로젝트에 새로운 역할을 추가하는 것은 기존 토큰의 만료에 영향을 미치지 않습니다."}, {"id": "q009", "chapter": "02-kakao-services/data-store", "chapter_name": "Data Store", "topic": "memstore", "difficulty": 2, "question": "카카오클라우드 MemStore에서 **고가용성(HA)** 기능을 사용하는 경우, Primary 노드 장애 발생 시 동작으로 옳은 것은?", "choices": [{"label": "A", "text": "사용자가 수동으로 Replica 노드를 Primary로 승격(Promote)해야 한다."}, {"label": "B", "text": "자동으로 가장 최신 데이터를 보유한 Replica 노드가 Primary로 승격되고, 새로운 Replica 노드가 자동 생성된다."}, {"label": "C", "text": "클러스터 전체가 재시작되며, 모든 데이터가 초기화된다."}, {"label": "D", "text": "Primary 노드 장애 시 고가용성 기능이 작동하지 않으며, 사용자가 직접 새 클러스터를 생성해야 한다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, MemStore에서 고가용성 기능을 사용하는 경우 Primary 노드 장애 시 자동으로 가장 최신 데이터를 보유한 Replica 노드를 선택하여 Primary로 승격(Automatic Failover)하며, 새로운 Replica 노드를 자동 생성하여 Replica 개수를 유지(Auto Healing)합니다. Replica 노드 장애 시에도 자동으로 새 노드로 대체하여 Replica 개수를 유지합니다.", "wrong_points": "- A: 고가용성 기능을 사용하는 경우에는 사용자가 수동으로 승격할 수 없습니다. 승격은 서비스에서 필요하다고 판단할 때 자동으로 수행됩니다. 수동 승격은 고가용성 기능을 사용하지 않는 경우에만 가능합니다.\n- C: 고가용성 장애 발생 시 클러스터 전체가 재시작되거나 데이터가 초기화되지 않습니다. Automatic Failover를 통해 서비스 연속성이 유지됩니다.\n- D: 고가용성 기능은 Primary 노드 장애 시 자동으로 동작하며, 사용자가 새 클러스터를 생성할 필요가 없습니다."}, {"id": "q003", "chapter": "04-security", "chapter_name": "보안 (IAM/Cloud Trail)", "topic": "iam-overview", "difficulty": 2, "question": "카카오클라우드 IAM **서비스 계정(Service Account)**에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "서비스 계정은 콘솔 로그인이 가능하며, 일반 사용자처럼 모든 UI 기능을 사용할 수 있다."}, {"label": "B", "text": "서비스 계정은 IAM 액세스 키와 S3 액세스 키를 각각 최대 2개까지 발급할 수 있으며, 프로젝트당 최대 100개 생성 가능하다."}, {"label": "C", "text": "서비스 계정에는 조직 역할도 부여할 수 있으며, 조직 단위의 작업을 자동화하는 데 사용된다."}, {"label": "D", "text": "서비스 계정은 IAM 사용자 목록에 포함되며, IAM 사용자 할당량에 영향을 준다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 서비스 계정은 콘솔 로그인 없이 인증 키를 사용해 API를 호출하는 비인터랙티브 계정입니다. IAM 액세스 키와 S3 액세스 키를 각각 최대 2개까지 발급할 수 있으며, 프로젝트당 최대 100개(비활성 포함)를 생성할 수 있습니다.", "wrong_points": "- A: 서비스 계정은 콘솔 로그인이 불가능한 API 호출 전용 계정입니다. 콘솔 UI를 사용할 수 없습니다.\n- C: 서비스 계정에는 프로젝트 단위 역할만 부여할 수 있습니다. 조직 역할은 서비스 계정에 적용되지 않습니다.\n- D: 서비스 계정은 IAM 사용자 목록에 포함되지 않으며, IAM 사용자 할당량에도 영향을 주지 않습니다."}, {"id": "q007", "chapter": "05-operations", "chapter_name": "운영 (모니터링/알림)", "topic": "monitoring", "difficulty": 2, "question": "카카오클라우드 **Monitoring**과 **Alert Center**의 관계에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "Monitoring과 Alert Center는 완전히 독립된 서비스이며 상호 연동이 불가능하다."}, {"label": "B", "text": "Monitoring과 Alert Center를 연동하면, 주요 메트릭 및 로그에 대한 임계치 알림을 설정하고 담당자에게 즉시 알림 메시지를 발송할 수 있다."}, {"label": "C", "text": "Alert Center는 Monitoring의 부가 유료 기능으로, 별도 결제 후 사용 가능하다."}, {"label": "D", "text": "Monitoring과 Alert Center를 연동하려면 별도의 에이전트를 추가로 설치해야 한다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Monitoring 서비스는 Alert Center와 연동할 수 있습니다. Alert Center에서 주요 메트릭 및 로그에 대한 임계치 알림을 설정하면, 해당 임계치에 도달하는 즉시 담당자에게 알림 메시지를 발송하여 보다 효율적으로 리소스를 관리할 수 있습니다. 두 서비스 모두 무료로 제공됩니다.", "wrong_points": "- A: Monitoring과 Alert Center는 상호 연동이 가능합니다. 카카오클라우드 공식 문서에서 두 서비스의 연동을 명시적으로 안내합니다.\n- C: Alert Center는 Monitoring의 유료 부가 기능이 아닙니다. Alert Center는 독립적인 서비스이며 무료로 제공됩니다.\n- D: Alert Center와의 연동을 위해 별도의 추가 에이전트를 설치할 필요는 없습니다. Monitoring 에이전트만 설치하면 Alert Center와 연동하여 알림을 받을 수 있습니다."}, {"id": "q002", "chapter": "01-cloud-overview", "chapter_name": "클라우드 개요", "topic": "region-az", "difficulty": 1, "question": "카카오클라우드에서 하나의 프로젝트에 생성할 수 있는 VPC의 최대 개수는?", "choices": [{"label": "A", "text": "1개"}, {"label": "B", "text": "3개"}, {"label": "C", "text": "5개"}, {"label": "D", "text": "10개"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 현재 생성할 수 있는 VPC는 프로젝트별 최대 3개입니다. 각 VPC에는 기본(main) 라우팅 테이블이 자동으로 생성되며, 서브넷 및 라우팅 테이블 상세 설정은 VPC How-to Guides를 참고해야 합니다.", "wrong_points": "- A: 1개는 실제 제한보다 과도하게 제한된 값입니다. 카카오클라우드는 프로젝트당 최대 3개 VPC를 허용합니다.\n- C: 5개는 공식 문서에 없는 숫자로, 프로젝트별 VPC 쿼터(3개)를 초과합니다.\n- D: 10개는 프로젝트별 VPC 제한(3개)과 다른 값입니다. 조직 내 프로젝트 최대 개수(30개)와 혼동할 수 있으니 주의가 필요합니다."}, {"id": "q005", "chapter": "03-billing", "chapter_name": "과금 및 쿼터", "topic": "quota", "difficulty": 2, "question": "카카오클라우드 Load Balancing 서비스의 **프로젝트당 기본 로드 밸런서 쿼터**와 **증설 가능 여부**로 옳은 것은?", "choices": [{"label": "A", "text": "10개, 증설 가능"}, {"label": "B", "text": "30개, 증설 가능"}, {"label": "C", "text": "50개, 증설 불가능"}, {"label": "D", "text": "100개, 증설 가능"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, Load Balancing 서비스의 기본 쿼터 중 로드 밸런서는 프로젝트당 50개이며, 증설 요청이 불가능합니다. 리스너는 프로젝트당 150개, 대상 그룹은 750개로 제한되며 이들도 모두 증설 불가입니다.", "wrong_points": "- A: 10개는 Kubernetes Engine의 프로젝트당 클러스터 기본 쿼터입니다. 로드 밸런서 기본 쿼터는 50개이며 증설이 불가능합니다.\n- B: 30개는 VPC의 프로젝트당 퍼블릭 IP 쿼터 또는 서브넷 쿼터입니다. 로드 밸런서 기본 쿼터는 50개입니다.\n- D: 로드 밸런서 기본 쿼터는 100개가 아닌 50개이며, 증설이 불가능합니다. 증설이 가능하다는 설명도 잘못되었습니다."}, {"id": "q001", "chapter": "02-kakao-services/container-pack", "chapter_name": "Container Pack", "topic": "kubernetes-overview", "difficulty": 1, "question": "카카오클라우드 Kubernetes Engine에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "사용자가 마스터 노드를 직접 구성하고 관리해야 하는 셀프 관리형 Kubernetes 서비스이다."}, {"label": "B", "text": "VPC를 기반으로 손쉽게 Kubernetes를 실행할 수 있는 카카오클라우드의 관리형 Kubernetes 서비스이다."}, {"label": "C", "text": "컨테이너 이미지를 저장하고 관리하기 위한 비공개 이미지 저장소 서비스이다."}, {"label": "D", "text": "가상 머신을 사용하지 않고 물리 서버에서 직접 컨테이너를 실행하는 서비스이다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Kubernetes Engine은 VPC(Virtual Private Cloud)를 기반으로 손쉽게 Kubernetes를 실행할 수 있는 카카오클라우드의 관리형 Kubernetes 서비스입니다. 클러스터의 제어 영역(마스터 노드)은 카카오클라우드가 완전 관리하며, 사용자는 워커 노드와 애플리케이션에만 집중할 수 있습니다.", "wrong_points": "- A: Kubernetes Engine은 관리형 서비스로, 사용자가 마스터 노드를 직접 구성하거나 관리할 필요가 없습니다. 제어 영역은 카카오클라우드가 별도의 VPC에서 완전 관리합니다.\n- C: 컨테이너 이미지를 저장하고 관리하는 비공개 이미지 저장소는 Container Registry 서비스입니다. Kubernetes Engine과는 다른 서비스입니다.\n- D: Kubernetes Engine의 노드는 Virtual Machine 서비스에서 제공하는 VM 인스턴스를 사용합니다. 물리 서버 직접 실행 서비스가 아닙니다."}, {"id": "q003", "chapter": "02-kakao-services/bcs", "chapter_name": "BCS (컴퓨팅)", "topic": "instance-type", "difficulty": 2, "question": "카카오클라우드 BCS 인스턴스 명명 규칙에 따를 때, `c2a.xlarge` 인스턴스에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "메모리 최적화 유형의 2세대 Intel 프로세서 기반 엑스트라 라지 인스턴스"}, {"label": "B", "text": "컴퓨팅 최적화 유형의 2세대 AMD 프로세서 기반 엑스트라 라지 인스턴스"}, {"label": "C", "text": "범용 유형의 2세대 AMD 프로세서 기반 엑스트라 라지 인스턴스"}, {"label": "D", "text": "가속 컴퓨팅 유형의 2세대 AMD 프로세서 기반 FPGA 최적화 엑스트라 라지 인스턴스"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, BCS 인스턴스 명명 규칙은 인스턴스 패밀리, 세대, 프로세서, 옵션, 크기를 조합합니다. c2a.xlarge를 분석하면 다음과 같습니다. 'c'는 컴퓨팅 최적화(Compute optimized) 패밀리, '2'는 2세대, 'a'는 AMD 프로세서, '.xlarge'는 인스턴스 크기를 의미합니다. 따라서 c2a.xlarge는 컴퓨팅 최적화 유형의 2세대 AMD 프로세서 기반 엑스트라 라지 인스턴스입니다.", "wrong_points": "- A: 메모리 최적화 인스턴스 패밀리는 'r'로 시작합니다(예: r2a). 'c'는 컴퓨팅 최적화를 의미합니다.\n- C: 범용 인스턴스 패밀리는 'm'으로 시작합니다(예: m2a, m3az). 'c'는 컴퓨팅 최적화를 의미합니다.\n- D: 가속 컴퓨팅 중 FPGA 관련 인스턴스는 'gf'로 시작합니다(예: gf1i). 'c'는 컴퓨팅 최적화 패밀리를 의미합니다."}, {"id": "q004", "chapter": "03-billing", "chapter_name": "과금 및 쿼터", "topic": "quota", "difficulty": 2, "question": "카카오클라우드 VPC 서비스의 **퍼블릭 IP 기본 쿼터**와 **증설 가능 여부**로 옳은 것은?", "choices": [{"label": "A", "text": "프로젝트별 10개, 증설 가능"}, {"label": "B", "text": "프로젝트별 30개, 증설 불가능"}, {"label": "C", "text": "프로젝트별 50개, 증설 가능"}, {"label": "D", "text": "프로젝트별 100개, 증설 불가능"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, VPC 서비스에서 퍼블릭 IP의 기본 쿼터는 프로젝트별 30개이며, 증설 요청이 불가능합니다. 참고로 VPC 자체는 3개/프로젝트(증설 가능), 서브넷은 30개/프로젝트(증설 가능), 보안 그룹은 180개/프로젝트(증설 불가)입니다.", "wrong_points": "- A: 퍼블릭 IP 기본 쿼터는 10개가 아닌 30개이며, 증설이 불가능합니다.\n- C: 50개는 Load Balancing 서비스의 로드 밸런서 기본 쿼터입니다. 퍼블릭 IP 기본 쿼터는 30개입니다.\n- D: 퍼블릭 IP 기본 쿼터는 100개가 아닌 30개입니다. 증설 불가능하다는 점은 맞지만, 수량이 틀렸습니다."}, {"id": "q005", "chapter": "04-security", "chapter_name": "보안 (IAM/Cloud Trail)", "topic": "cloud-trail", "difficulty": 1, "question": "카카오클라우드 **Cloud Trail** 서비스에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "Cloud Trail은 서버, 네트워크, 애플리케이션의 성능 지표를 수집하고 시각화하는 모니터링 서비스이다."}, {"label": "B", "text": "Cloud Trail은 사용자의 활동을 자동으로 수집·기록하고 최근 90일간의 이벤트를 조회할 수 있는 서비스이다."}, {"label": "C", "text": "Cloud Trail은 인스턴스의 로그를 실시간으로 분석하여 보안 위협을 차단하는 서비스이다."}, {"label": "D", "text": "Cloud Trail은 별도의 요금이 부과되는 유료 서비스이다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Cloud Trail은 사용자의 활동(로그인, 리소스 생성/변경/삭제 등)을 자동으로 수집하고 기록하는 서비스입니다. 콘솔에서 프로젝트에서 발생한 최근 90일간의 이벤트를 조회할 수 있으며, 보안 정책 준수 감사 자료로 활용할 수 있습니다. Cloud Trail은 추가 비용 없이 무료로 제공됩니다.", "wrong_points": "- A: 서버, 네트워크, 애플리케이션의 성능 지표를 수집하고 시각화하는 서비스는 Cloud Trail이 아닌 Monitoring 서비스입니다. Cloud Trail은 사용자 활동 추적에 초점을 맞춥니다.\n- C: 실시간 보안 위협 차단은 Cloud Trail의 기능이 아닙니다. Cloud Trail은 이미 발생한 사용자 활동을 기록하고 조회하는 감사 서비스입니다.\n- D: Cloud Trail은 추가 비용 없이 무료로 제공되는 서비스입니다."}, {"id": "q007", "chapter": "02-kakao-services/bss", "chapter_name": "BSS (스토리지)", "topic": "file-storage", "difficulty": 2, "question": "카카오클라우드 File Storage의 Basic 인스턴스 유형에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "최소 100GB ~ 최대 1TB까지 할당 가능하며, 100GB 단위로 설정할 수 있다."}, {"label": "B", "text": "최소 1.0TB ~ 최대 16TB까지 할당 가능하며, 0.5TB 단위로 설정할 수 있다."}, {"label": "C", "text": "최소 1.0TB ~ 최대 50TB까지 할당 가능하며, 1TB 단위로 설정할 수 있다."}, {"label": "D", "text": "용량 제한 없이 자유롭게 설정할 수 있으며, 실제 사용량만큼 비용이 청구된다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, File Storage의 Basic 유형 인스턴스는 최소 1.0TB ~ 최대 16TB로 할당이 가능하며, 0.5TB 단위로 설정할 수 있습니다. Basic 유형은 가장 범용적인 사양의 인스턴스로 현재 File Storage에서 지원하는 유일한 유형입니다.", "wrong_points": "- A: Basic 유형의 최소 용량은 100GB가 아닌 1.0TB이며, 최대 용량도 1TB가 아닌 16TB입니다. 단위도 100GB가 아닌 0.5TB입니다.\n- C: 최대 50TB는 프로젝트 전체 File Storage의 최대 할당 용량이며, 단일 인스턴스의 최대 크기가 아닙니다. 단일 인스턴스 최대 용량은 16TB입니다.\n- D: File Storage는 할당된 용량만큼 비용이 청구됩니다. 실제 사용량 기준이 아닌 할당 용량 기준으로 과금됩니다."}, {"id": "q002", "chapter": "02-kakao-services/bcs", "chapter_name": "BCS (컴퓨팅)", "topic": "bare-metal", "difficulty": 1, "question": "카카오클라우드 Bare Metal Server(BMS)에서 현재 제공하는 인스턴스 유형으로 옳은 것은?", "choices": [{"label": "A", "text": "범용(General purpose), 컴퓨팅 최적화(Compute optimized)"}, {"label": "B", "text": "메모리 최적화(Memory optimized), 가속 컴퓨팅(Accelerated computing)"}, {"label": "C", "text": "범용(General purpose), 메모리 최적화(Memory optimized), 가속 컴퓨팅(Accelerated computing)"}, {"label": "D", "text": "컴퓨팅 최적화(Compute optimized), 메모리 최적화(Memory optimized), 가속 컴퓨팅(Accelerated computing)"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Bare Metal Server(BMS)는 메모리 최적화(Memory optimized)와 가속 컴퓨팅(Accelerated computing) 인스턴스 유형만 제공합니다. 범용(General purpose) 인스턴스는 BMS에서 추후 지원 예정으로 현재는 제공되지 않으며, 컴퓨팅 최적화(Compute optimized) 인스턴스는 VM에서만 제공됩니다.", "wrong_points": "- A: 범용 인스턴스는 BMS에서 추후 지원 예정이며 현재는 제공되지 않습니다. 컴퓨팅 최적화 인스턴스도 BMS에서는 제공되지 않습니다.\n- C: 범용 인스턴스는 BMS에서 현재 제공되지 않습니다. BMS는 고성능이 요구되는 메모리 최적화와 가속 컴퓨팅 유형만 제공합니다.\n- D: 컴퓨팅 최적화(c2a) 인스턴스는 VM에서만 제공되며, BMS에서는 제공되지 않습니다."}, {"id": "q006", "chapter": "07-complex", "chapter_name": "복합 시나리오", "topic": "architecture", "difficulty": 2, "question": "카카오클라우드 튜토리얼에서 제공하는 **3 Tier 아키텍처** 구성 요소로 옳은 것은?", "choices": [{"label": "A", "text": "WEB, Cache, DB"}, {"label": "B", "text": "WEB, APP, DB"}, {"label": "C", "text": "Frontend, Backend, Storage"}, {"label": "D", "text": "API Gateway, Microservice, Database"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 카카오클라우드를 시작하는 가장 기본적인 시나리오로 **WEB, APP, DB**로 구성된 3 Tier 아키텍처를 구축하는 튜토리얼을 제공합니다. 이 3-tier 구조는 웹(프레젠테이션) 계층, 애플리케이션(비즈니스 로직) 계층, 데이터베이스(데이터) 계층으로 나뉘는 전통적인 클라우드 아키텍처 패턴입니다.", "wrong_points": "- A: 3 Tier 아키텍처는 Cache가 아닌 APP(애플리케이션) 계층으로 구성됩니다.\n- C: 카카오클라우드 공식 문서에서 제시하는 계층 명칭은 Frontend/Backend/Storage가 아닌 WEB/APP/DB입니다.\n- D: API Gateway/Microservice/Database는 마이크로서비스 아키텍처 패턴으로, 카카오클라우드 기본 3 Tier 튜토리얼과는 다릅니다."}, {"id": "q003", "chapter": "05-operations", "chapter_name": "운영 (모니터링/알림)", "topic": "alert-center", "difficulty": 1, "question": "카카오클라우드 **Alert Center**에서 지원하는 **수신 채널(알림 발송 채널)**이 아닌 것은?", "choices": [{"label": "A", "text": "이메일, 문자, 알림톡(카카오톡)"}, {"label": "B", "text": "슬랙(Slack), 웹훅(Webhook)"}, {"label": "C", "text": "Pub/Sub"}, {"label": "D", "text": "SMS 자동 응답 시스템(ARS)"}], "answer": "D", "explanation": "카카오클라우드 공식 문서에 따르면, Alert Center에서 지원하는 수신 채널은 이메일, 문자, 알림톡(카카오톡 비즈메시지), 슬랙, 웹훅, Pub/Sub입니다. SMS 자동 응답 시스템(ARS)은 지원하지 않는 채널입니다.", "wrong_points": "- A: 이메일, 문자, 알림톡은 모두 Alert Center에서 지원하는 수신 채널입니다.\n- B: 슬랙과 웹훅은 모두 Alert Center에서 지원하는 수신 채널입니다.\n- C: Pub/Sub은 Alert Center에서 지원하는 수신 채널로, 사용자가 설정한 카카오클라우드 Pub/Sub 토픽으로 알림 내용을 발송할 수 있습니다."}, {"id": "q003", "chapter": "03-billing", "chapter_name": "과금 및 쿼터", "topic": "quota", "difficulty": 2, "question": "카카오클라우드 Bare Metal Server(BMS)의 쿼터에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "BMS는 Virtual Machine과 완전히 독립된 별도의 인스턴스/vCPU/메모리 쿼터를 가진다."}, {"label": "B", "text": "BMS의 인스턴스 수, CPU 코어 수, 메모리 쿼터는 Virtual Machine과 공유된다."}, {"label": "C", "text": "BMS는 쿼터 제한이 없으며, 원하는 만큼 인스턴스를 생성할 수 있다."}, {"label": "D", "text": "BMS 쿼터는 Virtual Machine보다 2배 많이 할당되며, 별도의 풀로 관리된다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Bare Metal Server의 인스턴스 수, CPU 코어 수, 메모리 쿼터는 Virtual Machine과 공유됩니다. 따라서 BMS 인스턴스를 생성하면 VM의 쿼터 사용량도 함께 증가합니다. 또한 프로젝트당 네트워크 인터페이스 수 쿼터에는 각 서비스 생성 시 자동 생성되는 관리 네트워크 인터페이스 수도 포함됩니다.", "wrong_points": "- A: BMS의 인스턴스/vCPU/메모리 쿼터는 Virtual Machine과 별도가 아닌 공유 쿼터로 관리됩니다. 독립된 별도 쿼터가 아닙니다.\n- C: BMS도 쿼터 제한이 있으며, VM과 쿼터를 공유합니다. 제한 없이 생성할 수 있다는 설명은 잘못되었습니다.\n- D: BMS 쿼터가 VM보다 2배 많다는 설명은 잘못되었습니다. BMS는 VM과 동일한 쿼터 풀을 공유합니다."}, {"id": "q008", "chapter": "02-kakao-services/bns", "chapter_name": "BNS (네트워킹)", "topic": "load-balancer", "difficulty": 2, "question": "카카오클라우드에서 **클라이언트 IP를 보존하여 전달**해야 하는 요구사항이 있을 때 선택해야 하는 로드 밸런서 유형은?", "choices": [{"label": "A", "text": "ALB(Application Load Balancer)"}, {"label": "B", "text": "NLB(Network Load Balancer)"}, {"label": "C", "text": "DSRNLB(Direct Server Return Network Load Balancer)"}, {"label": "D", "text": "GLB(Global Load Balancer)"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, DSRNLB(Direct Server Return Network Load Balancer)는 TCP, UDP 프로토콜을 지원하며 OSI L4로 동작하고, 클라이언트 IP를 보존하여 전달해야 할 경우 선택합니다. ALB는 HTTP/HTTPS 기반 L7 라우팅에, NLB는 대규모 트래픽에서 빠른 처리 속도가 필요한 경우에 주로 사용됩니다.", "wrong_points": "- A: ALB는 HTTP, HTTPS 프로토콜을 지원하는 OSI L7 로드 밸런서로, 웹 사이트나 마이크로서비스에 적합합니다. 클라이언트 IP 보존이 주요 목적이 아닙니다.\n- B: NLB는 TCP, UDP, TLS 프로토콜을 지원하는 OSI L4 로드 밸런서로, 대규모 트래픽의 빠른 처리가 필요한 경우에 선택합니다. 클라이언트 IP 보존이 주요 특징이 아닙니다.\n- D: GLB(Global Load Balancer)는 카카오클라우드에서 제공하지 않는 로드 밸런서 유형입니다."}, {"id": "q004", "chapter": "04-security", "chapter_name": "보안 (IAM/Cloud Trail)", "topic": "iam-overview", "difficulty": 3, "question": "카카오클라우드 IAM **서비스 에이전트 계정(Service Agent Account)**에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "서비스 에이전트 계정은 사용자가 직접 생성하여 자동화 작업에 활용하는 계정이다."}, {"label": "B", "text": "서비스 에이전트 계정은 카카오클라우드 서비스가 리소스를 조작할 때 자동으로 생성되는 시스템 전용 계정이다."}, {"label": "C", "text": "서비스 에이전트 계정은 사용자가 직접 삭제할 수 있으며, 삭제 후 재생성할 수 있다."}, {"label": "D", "text": "서비스 에이전트 계정은 IAM 사용자와 동일한 권한을 가지며, 콘솔 로그인도 가능하다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 서비스 에이전트 계정은 사용자가 직접 생성하지 않으며, 카카오클라우드 서비스가 리소스를 조작할 때 자동으로 생성되는 시스템 전용 계정입니다. 예를 들어 Kubernetes Engine에서 노드 풀을 추가하면 해당 요청을 수행하기 위해 전용 서비스 에이전트가 VM 인스턴스를 자동으로 생성합니다. 사용자가 직접 생성, 수정, 삭제할 수 없습니다.", "wrong_points": "- A: 서비스 에이전트 계정은 사용자가 직접 생성하는 계정이 아닙니다. 사용자가 직접 생성하는 계정은 서비스 계정(Service Account)입니다. 서비스 에이전트 계정은 카카오클라우드 서비스가 자동으로 생성합니다.\n- C: 서비스 에이전트 계정은 사용자가 직접 생성, 수정, 삭제할 수 없습니다. 단, 프로젝트를 삭제하면 해당 프로젝트의 모든 서비스 에이전트 계정도 함께 삭제됩니다.\n- D: 서비스 에이전트 계정은 내부 전용 계정으로 콘솔 로그인 또는 API 호출 등 사용자가 직접 제어할 수 없습니다. IAM 사용자와 동일한 권한을 가지지 않습니다."}, {"id": "q009", "chapter": "06-account", "chapter_name": "계정 관리", "topic": "iam-roles", "difficulty": 2, "question": "카카오클라우드 IAM에서 제공하는 **역할(Role)의 분류**로 옳은 것은?", "choices": [{"label": "A", "text": "글로벌 역할, 리전 역할, 서비스 역할"}, {"label": "B", "text": "사용자 역할, 그룹 역할, 서비스 역할"}, {"label": "C", "text": "조직 역할, 프로젝트 역할, 서비스 역할"}, {"label": "D", "text": "루트 역할, 서브 역할, 리소스 역할"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, IAM 역할은 **조직 역할(Organization Role)**, **프로젝트 역할(Project Role)**, **서비스 역할(Service Role)** 세 가지로 분류됩니다. 조직 역할은 조직 수준의 권한을 부여하고, 프로젝트 역할은 특정 프로젝트 내 리소스 접근 권한을 부여하며, 서비스 역할은 특정 서비스에 대한 세부 권한을 관리합니다.", "wrong_points": "- A: IAM 역할은 글로벌/리전 역할로 구분되지 않습니다. 조직/프로젝트/서비스 역할로 구분됩니다.\n- B: 역할은 사용자/그룹 역할이 아닌, 역할이 적용되는 범위(조직/프로젝트/서비스)에 따라 분류됩니다.\n- D: IAM 역할에는 루트/서브/리소스 역할이라는 분류가 없습니다."}, {"id": "q002", "chapter": "05-operations", "chapter_name": "운영 (모니터링/알림)", "topic": "monitoring", "difficulty": 2, "question": "카카오클라우드 Monitoring의 **기본 대시보드**와 **커스텀 대시보드**에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "기본 대시보드는 사용자가 임의로 수정할 수 있으며, 커스텀 대시보드는 카카오클라우드가 제공하는 고정 대시보드이다."}, {"label": "B", "text": "기본 대시보드와 커스텀 대시보드 모두 사용자가 자유롭게 수정할 수 있다."}, {"label": "C", "text": "기본 대시보드는 사용자가 임의 수정이 불가능하고 조회만 가능하며, 커스텀 대시보드는 사용자가 직접 생성하여 원하는 메트릭 차트를 추가할 수 있다."}, {"label": "D", "text": "기본 대시보드와 커스텀 대시보드 모두 별도 설정 없이 바로 사용 가능하다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, 기본 대시보드는 카카오클라우드에서 기본 제공하는 대시보드로 별도 설정 없이 바로 사용 중인 리소스의 메트릭을 조회할 수 있지만, 사용자가 임의로 수정하는 것은 불가능합니다. 커스텀 대시보드는 사용자가 직접 생성하고 원하는 서비스의 메트릭 차트를 추가하여 관리할 수 있는 대시보드입니다.", "wrong_points": "- A: 기본 대시보드와 커스텀 대시보드의 설명이 반대로 되어 있습니다. 기본 대시보드는 카카오클라우드 제공 고정 대시보드이고, 커스텀 대시보드는 사용자가 생성하는 대시보드입니다.\n- B: 기본 대시보드는 사용자가 임의 수정이 불가능합니다. 수정 가능한 것은 커스텀 대시보드입니다.\n- D: 별도 설정 없이 바로 사용 가능한 것은 기본 대시보드만 해당됩니다. 커스텀 대시보드는 사용자가 직접 생성해야 합니다."}, {"id": "q007", "chapter": "02-kakao-services/bns", "chapter_name": "BNS (네트워킹)", "topic": "load-balancer", "difficulty": 1, "question": "카카오클라우드가 제공하는 로드 밸런서(Load Balancer) 유형을 모두 고른 것은?", "choices": [{"label": "A", "text": "ALB(Application Load Balancer), NLB(Network Load Balancer)"}, {"label": "B", "text": "ALB(Application Load Balancer), NLB(Network Load Balancer), DSRNLB(Direct Server Return Network Load Balancer)"}, {"label": "C", "text": "ALB(Application Load Balancer), NLB(Network Load Balancer), GLB(Global Load Balancer)"}, {"label": "D", "text": "NLB(Network Load Balancer), DSRNLB(Direct Server Return Network Load Balancer), ILB(Internal Load Balancer)"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 카카오클라우드는 Application Load Balancer(ALB), Network Load Balancer(NLB), Direct Server Return Network Load Balancer(DSRNLB)의 3가지 로드 밸런서 유형을 제공합니다. ALB는 HTTP/HTTPS를 지원하는 OSI L7 로드 밸런서, NLB는 TCP/UDP/TLS를 지원하는 OSI L4 로드 밸런서, DSRNLB는 클라이언트 IP를 보존해야 할 경우 사용하는 OSI L4 로드 밸런서입니다.", "wrong_points": "- A: 2가지 유형만 제시하고 있어 DSRNLB가 누락되었습니다. 카카오클라우드는 3가지 유형을 제공합니다.\n- C: GLB(Global Load Balancer)는 카카오클라우드가 제공하는 로드 밸런서 유형에 포함되지 않습니다.\n- D: ILB(Internal Load Balancer)는 카카오클라우드가 제공하는 로드 밸런서 유형에 포함되지 않습니다. ALB가 누락되어 있습니다."}, {"id": "q009", "chapter": "02-kakao-services/container-pack", "chapter_name": "Container Pack", "topic": "kubernetes-overview", "difficulty": 2, "question": "카카오클라우드 Kubernetes Engine의 고가용성(HA) 구성에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "Kubernetes Engine은 단일 가용 영역(AZ)에만 클러스터를 배포하며, 다중 AZ 구성은 지원하지 않는다."}, {"label": "B", "text": "Kubernetes Engine은 다중 가용 영역(Multi-AZ)에 노드 풀을 분산 배치하여 고가용성 클러스터를 구성할 수 있다."}, {"label": "C", "text": "고가용성을 위해서는 클러스터를 여러 리전에 걸쳐 배포해야 하며, 단일 리전 내에서는 HA 구성이 불가능하다."}, {"label": "D", "text": "다중 AZ 구성은 BMS 노드에만 적용 가능하며, VM 노드는 단일 AZ에만 배포된다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Kubernetes Engine은 다중 가용 영역(Multi-AZ)에 노드 풀을 분산 배치하여 고가용성(HA) 클러스터를 구성할 수 있습니다. 특정 AZ에 장애가 발생하더라도 다른 AZ의 노드가 서비스를 계속 제공할 수 있어 서비스 연속성이 보장됩니다.", "wrong_points": "- A: Kubernetes Engine은 단일 AZ뿐만 아니라 다중 AZ 구성을 지원합니다. 다중 AZ 배포를 통해 고가용성 클러스터를 구성할 수 있습니다.\n- C: 고가용성 구성은 여러 리전이 아닌 단일 리전 내 다중 가용 영역(AZ)에서도 구현 가능합니다. 다중 리전 배포는 별도의 구성이 필요합니다.\n- D: 다중 AZ 구성은 BMS 노드에만 국한되지 않습니다. VM 노드도 다중 AZ에 분산 배치하여 고가용성을 구성할 수 있습니다."}, {"id": "q009", "chapter": "04-security", "chapter_name": "보안 (IAM/Cloud Trail)", "topic": "iam-overview", "difficulty": 3, "question": "카카오클라우드 IAM에서 사용자를 **그룹에서 제거**할 때의 동작으로 옳은 것은?", "choices": [{"label": "A", "text": "그룹에서 제거되면 해당 그룹을 통해 부여된 역할과 직접 부여된 역할이 모두 회수된다."}, {"label": "B", "text": "그룹에서 제거되면 해당 그룹을 통해 부여된 역할은 회수되고, 직접 부여된 역할은 유지되며, 해당 그룹을 통해 발급된 API 토큰은 즉시 만료된다."}, {"label": "C", "text": "그룹에서 제거되어도 기존 역할과 API 토큰은 24시간 동안 유효하게 유지된다."}, {"label": "D", "text": "그룹에서 제거되면 모든 API 토큰이 즉시 만료되고, 새 토큰을 발급받기 위해 재로그인이 필요하다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 그룹에서 사용자를 제거하거나 그룹을 삭제하면 해당 그룹을 통해 부여된 역할은 회수되지만, 사용자에게 직접 부여된 역할은 그대로 유지됩니다. 또한 그룹에서 제거되면 해당 그룹을 통해 발급된 API 토큰은 즉시 만료됩니다.", "wrong_points": "- A: 그룹 제거 시 직접 부여된 역할까지 모두 회수되지는 않습니다. 직접 부여된 역할은 그룹 제거와 관계없이 유지됩니다.\n- C: 그룹 제거 후 역할과 토큰이 24시간 동안 유효하다는 설명은 잘못되었습니다. 해당 그룹을 통해 발급된 API 토큰은 즉시 만료됩니다.\n- D: 그룹 제거 시 모든 API 토큰이 만료되는 것이 아니라, 해당 그룹을 통해 발급된 토큰만 만료됩니다. 직접 부여된 역할로 발급된 토큰은 유지됩니다."}, {"id": "q007", "chapter": "02-kakao-services/bcs", "chapter_name": "BCS (컴퓨팅)", "topic": "bare-metal", "difficulty": 2, "question": "카카오클라우드 Bare Metal Server(BMS)의 사용 목적이나 적합한 사례로 옳지 **않은** 것은?", "choices": [{"label": "A", "text": "AI/ML 워크로드처럼 대용량 데이터 처리가 필수적인 경우에 적합하다."}, {"label": "B", "text": "가상화 환경 위에서만 실행 가능한 소프트웨어를 운영할 때 주로 사용된다."}, {"label": "C", "text": "Oracle DBMS처럼 라이선스 이슈로 가상화 자원에서 운영할 수 없는 경우에 활용된다."}, {"label": "D", "text": "게임, 미디어 서비스에서 대규모 데이터베이스 작업 및 고성능 컴퓨팅에 활용된다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Bare Metal Server는 가상화되지 않은 물리 서버 단독 환경에서 하드웨어에 직접 액세스합니다. 따라서 가상화 환경 위에서만 실행 가능한 소프트웨어가 아니라, 비가상화 환경에서 실행이 필요하거나 독자적인 하이퍼바이저가 필요한 워크로드에 적합합니다. BMS는 AI/ML, 게임·미디어, Oracle처럼 라이선스로 가상화 자원을 쓸 수 없는 케이스 등 고성능·독립 환경이 필요한 경우에 활용됩니다.", "wrong_points": "- A: AI/ML 워크로드는 대용량 데이터 처리가 필수적이므로 BMS의 대표적인 활용 사례입니다.\n- C: Oracle DBMS처럼 라이선스 제약으로 가상화 자원 위에서 운영할 수 없는 경우, BMS를 활용하면 이러한 제약을 해결할 수 있습니다.\n- D: 게임, 미디어 서비스의 대규모 데이터베이스 작업과 고성능 컴퓨팅은 BMS의 주요 활용 사례로 공식 문서에 명시되어 있습니다."}, {"id": "q010", "chapter": "07-complex", "chapter_name": "복합 시나리오", "topic": "api-preparation", "difficulty": 3, "question": "카카오클라우드 API로 **사용자가 속한 프로젝트 목록을 조회**할 때, Request Header에 포함해야 하는 항목으로 옳은 것은?", "choices": [{"label": "A", "text": "`Content-Type: application/json`"}, {"label": "B", "text": "`X-Auth-Token: {tokenId}`"}, {"label": "C", "text": "`Authorization: Bearer {tokenId}`"}, {"label": "D", "text": "`X-Subject-Token: {tokenId}`"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 프로젝트 목록 조회 API(`GET https://iam.kakaocloud.com/identity/v3/users/{userId}/projects`)를 호출할 때 Request Header에 **`X-Auth-Token: {tokenId}`**을 필수로 포함해야 합니다. `{tokenId}`는 발급받은 API 인증 토큰 값을 사용합니다.", "wrong_points": "- A: `Content-Type: application/json`은 API 인증 토큰 발급 요청 시 필요한 헤더입니다. 프로젝트 목록 조회 시에는 `X-Auth-Token`을 사용합니다.\n- C: 카카오클라우드 API에서는 `Authorization: Bearer` 방식이 아닌 `X-Auth-Token` 헤더를 사용합니다.\n- D: `X-Subject-Token`은 토큰 발급 응답(Response Header)에서 발급된 토큰 값을 확인하는 항목입니다. 요청(Request Header)에서 인증에 사용하는 항목은 `X-Auth-Token`입니다."}, {"id": "q007", "chapter": "04-security", "chapter_name": "보안 (IAM/Cloud Trail)", "topic": "iam-overview", "difficulty": 2, "question": "카카오클라우드 IAM의 **조직(Organization)**에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "조직은 IAM 구조에서 프로젝트의 하위 단위이다."}, {"label": "B", "text": "조직은 IAM 구조의 최상위 단위로, 여러 프로젝트, 사용자, 그룹, 서비스 계정을 포함할 수 있다."}, {"label": "C", "text": "하나의 사용자는 하나의 조직에만 소속될 수 있다."}, {"label": "D", "text": "조직 단위에서는 IAM 서비스만 관리 가능하며, Billing이나 Cloud Trail에는 접근할 수 없다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 조직은 카카오클라우드 IAM 구조의 최상위 단위입니다. 하나의 조직은 여러 프로젝트, 사용자, 그룹, 서비스 계정을 포함할 수 있으며, 로그인 설정, 사용자 초대, 그룹/프로젝트 생성 등을 중앙에서 관리할 수 있습니다. 조직 단위에서는 Billing, Cloud Trail, Alert Center 등 글로벌 서비스의 접근 권한도 제어할 수 있습니다.", "wrong_points": "- A: 조직은 프로젝트의 하위 단위가 아닙니다. IAM 구조의 최상위 단위로, 조직 아래에 프로젝트가 위치합니다.\n- C: 하나의 사용자 계정은 여러 조직에 가입하거나 소속될 수 있습니다. 단, 각 조직 내에서는 고유해야 합니다.\n- D: 조직 단위에서는 IAM 서비스 외에도 Billing, Cloud Trail, Alert Center 등 글로벌 서비스의 접근 권한을 제어할 수 있습니다."}, {"id": "q008", "chapter": "02-kakao-services/data-store", "chapter_name": "Data Store", "topic": "memstore", "difficulty": 2, "question": "카카오클라우드 MemStore의 **클러스터 구성** 단위를 올바르게 설명한 것은?", "choices": [{"label": "A", "text": "클러스터는 단일 노드로만 구성되며, 샤드 개념을 지원하지 않는다."}, {"label": "B", "text": "클러스터는 다수의 샤드로 구성되고, 각 샤드는 하나의 Primary 노드와 다수의 Replica 노드로 구성된다."}, {"label": "C", "text": "클러스터는 다수의 인스턴스 그룹으로 구성되며, 각 인스턴스 그룹은 Primary와 Standby 역할을 가진다."}, {"label": "D", "text": "클러스터는 단일 샤드만 지원하며, 샤드 추가는 불가능하다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, MemStore 클러스터는 다수의 샤드로 구성되며, 각 샤드는 하나의 Primary 노드와 다수의 Replica 노드로 구성됩니다. 클러스터 데이터세트는 샤드 단위로 분할되며, 부하 증가 시 샤드를 추가하거나 읽기 부하 증가 시 Replica 노드를 추가할 수 있습니다.", "wrong_points": "- A: MemStore 클러스터는 단일 노드가 아닌 다수의 샤드로 구성되며, 각 샤드는 Primary와 Replica 노드로 이루어집니다. 샤드 개념을 지원합니다.\n- C: MemStore의 구성 단위는 '인스턴스 그룹'이 아닌 '샤드'와 '노드'입니다. 인스턴스 그룹은 MySQL/PostgreSQL에서 사용하는 개념입니다.\n- D: MemStore 클러스터는 단일 샤드만 지원하지 않습니다. 클러스터에 부하가 증가할 경우 샤드를 추가(샤드 추가 기능)하거나 불필요한 샤드를 삭제할 수 있습니다."}, {"id": "q004", "chapter": "02-kakao-services/bss", "chapter_name": "BSS (스토리지)", "topic": "object-storage", "difficulty": 2, "question": "카카오클라우드 Object Storage에서 객체의 키(Key)에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "객체의 키는 버킷 이름을 포함하여 512 bytes를 초과할 수 없다."}, {"label": "B", "text": "객체의 키는 디렉터리 구분자(/)를 포함하여 432 bytes를 초과할 수 없다."}, {"label": "C", "text": "객체의 키는 영문, 숫자만 사용 가능하며 특수문자는 허용되지 않는다."}, {"label": "D", "text": "객체의 키는 버킷 내에서 고유할 필요가 없으며 중복이 허용된다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 객체의 키(Key)는 객체 고유의 식별자로 버킷의 파일 위치로 표현됩니다. 예를 들어 kakao/i/cloud.png와 같이 디렉터리 계층 구조를 표현하는 '/'를 포함하여 432 bytes를 초과할 수 없습니다. 이 제한을 초과하면 파일 업로드, 파일 이름 변경, 파일 이동 등 키(경로)가 변경되는 요청이 실패할 수 있습니다.", "wrong_points": "- A: 객체 키의 최대 크기는 512 bytes가 아닌 432 bytes입니다. 또한 버킷 이름은 키에 포함되지 않습니다.\n- C: 공식 문서에서 객체 키는 영문·숫자만 사용 가능하다는 제한을 언급하지 않습니다. '/'를 포함한 경로 구조를 지원하며 다양한 문자를 사용할 수 있습니다.\n- D: 객체의 키는 버킷 내에서 고유한 식별자입니다. 키가 동일하면 덮어쓰기가 발생하므로 각 객체는 고유한 키를 가져야 합니다."}, {"id": "q006", "chapter": "02-kakao-services/container-pack", "chapter_name": "Container Pack", "topic": "node-group", "difficulty": 2, "question": "카카오클라우드 Kubernetes Engine의 노드 쿼터에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "클러스터당 최대 노드 수는 50개이며, BMS 노드도 동일하게 50개까지 허용된다."}, {"label": "B", "text": "클러스터당 최대 노드 수는 100개이며, BMS 노드도 동일하게 100개까지 허용된다."}, {"label": "C", "text": "클러스터당 최대 노드 수는 100개이지만, BMS 노드는 클러스터당 최대 5개까지만 허용된다."}, {"label": "D", "text": "클러스터당 최대 노드 수는 200개이며, BMS 노드는 클러스터당 최대 10개까지 허용된다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, Kubernetes Engine에서 클러스터당 생성할 수 있는 최대 노드 수는 100개입니다. 단, BMS(Bare Metal Server) 노드의 경우 클러스터당 최대 5개까지만 허용됩니다. BMS 노드는 일반 VM 노드와 달리 물리 서버 자원을 직접 사용하기 때문에 별도의 제한이 적용됩니다.", "wrong_points": "- A: 클러스터당 최대 노드 수는 50개가 아닌 100개입니다. 또한 BMS 노드와 일반 노드의 쿼터는 다릅니다.\n- B: 클러스터당 최대 노드 수(100개)는 맞지만, BMS 노드의 최대 허용 수는 100개가 아닌 5개입니다. BMS 노드는 별도의 더 낮은 쿼터가 적용됩니다.\n- D: 클러스터당 최대 노드 수는 200개가 아닌 100개이며, BMS 노드는 10개가 아닌 5개까지 허용됩니다."}, {"id": "q004", "chapter": "02-kakao-services/bcs", "chapter_name": "BCS (컴퓨팅)", "topic": "image", "difficulty": 1, "question": "카카오클라우드 Virtual Machine 서비스에서 제공하는 이미지 유형에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "기본 이미지는 특정 프로젝트 전용으로만 사용 가능하며, 모든 사용자가 접근할 수 없다."}, {"label": "B", "text": "커스텀 이미지는 카카오클라우드에서 기본적으로 제공하는 이미지로 Linux 및 Windows를 지원한다."}, {"label": "C", "text": "기본 이미지는 카카오클라우드에서 제공하며 모든 사용자가 접근 가능하고, 커스텀 이미지는 사용자가 직접 생성한 이미지이다."}, {"label": "D", "text": "Bare Metal Server와 달리 Virtual Machine은 커스텀 이미지 생성을 지원하지 않는다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, VM 서비스는 두 가지 이미지 유형을 제공합니다. 기본 이미지는 카카오클라우드에서 기본적으로 제공하는 이미지로 Linux 및 Windows 이미지를 포함하며, 기본적으로 모든 사용자가 접근할 수 있습니다. 커스텀 이미지는 사용자가 생성한 이미지로, 특정 프로젝트 또는 워크로드에 맞게 구성할 수 있습니다.", "wrong_points": "- A: 기본 이미지는 카카오클라우드에서 제공하며 기본적으로 모든 사용자가 접근할 수 있습니다. 특정 프로젝트 전용이 아닙니다.\n- B: 커스텀 이미지는 카카오클라우드에서 기본 제공하는 이미지가 아니라 사용자가 직접 생성하는 이미지입니다.\n- D: Virtual Machine 서비스는 커스텀 이미지 생성을 지원합니다. 오히려 Bare Metal Server가 사용자 이미지 생성·관리를 지원하지 않으며 기본 이미지만 사용 가능합니다."}, {"id": "q001", "chapter": "06-account", "chapter_name": "계정 관리", "topic": "api-token", "difficulty": 1, "question": "카카오클라우드 API 토큰의 기본 **유효 기간**으로 옳은 것은?", "choices": [{"label": "A", "text": "1시간"}, {"label": "B", "text": "6시간"}, {"label": "C", "text": "12시간"}, {"label": "D", "text": "24시간"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, API 토큰의 기본 유효 기간은 발급 시점으로부터 **12시간**입니다. 토큰은 UTC 기준으로 12시간 후 만료되며, KST(UTC+9)로 환산하면 발급 후 12시간 뒤에 만료됩니다. 토큰이 만료된 후에는 새로운 토큰을 발급받아야 합니다.", "wrong_points": "- A: API 토큰 유효 기간은 1시간이 아닙니다. 12시간입니다.\n- B: API 토큰 유효 기간은 6시간이 아닙니다. 12시간입니다.\n- D: API 토큰 유효 기간은 24시간이 아닙니다. 12시간입니다."}, {"id": "q004", "chapter": "01-cloud-overview", "chapter_name": "클라우드 개요", "topic": "kakaocloud-overview", "difficulty": 2, "question": "카카오클라우드 고객 지원 채널에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "일반 상담과 긴급/장애 문의 모두 평일 10시~19시에만 대응한다."}, {"label": "B", "text": "긴급/장애 문의는 24시간 대응하며, 전화 채널(1688-0301)을 통해서도 접수 가능하다."}, {"label": "C", "text": "헬프데스크는 카카오클라우드 콘솔 로그인 없이도 이용할 수 있다."}, {"label": "D", "text": "비밀번호 분실 시에도 콘솔 헬프데스크를 통해서만 문의할 수 있다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 긴급/장애 문의는 24시간 대응하며, 인터넷 사용이 어렵거나 긴급 장애 발생 시 전화 채널(1688-0301)을 통해서도 지원을 받을 수 있습니다. 일반 상담은 평일 10시~19시로 제한됩니다.", "wrong_points": "- A: 일반 상담은 평일 10~19시이나, 긴급/장애 문의는 24시간 대응합니다. 두 채널의 운영 시간이 다릅니다.\n- C: 콘솔 헬프데스크는 카카오클라우드 콘솔에 로그인한 후에 이용할 수 있습니다. 콘솔 로그인 없이 문의하려면 1:1 문의하기 사이트를 이용해야 합니다.\n- D: 비밀번호 분실 등으로 콘솔에 로그인할 수 없는 경우에는 콘솔 헬프데스크가 아닌 1:1 문의하기 사이트를 이용해야 합니다."}, {"id": "q009", "chapter": "02-kakao-services/bss", "chapter_name": "BSS (스토리지)", "topic": "file-storage", "difficulty": 2, "question": "카카오클라우드 File Storage 서비스의 프로젝트 내 총 할당 가능 용량은?", "choices": [{"label": "A", "text": "16TB"}, {"label": "B", "text": "32TB"}, {"label": "C", "text": "50TB"}, {"label": "D", "text": "100TB"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, File Storage 서비스는 GA 버전으로 프로젝트 내 총 50TB까지 용량을 할당할 수 있습니다. 단일 인스턴스의 최대 용량은 16TB이며, 헬프데스크를 통해 증설 요청이 가능합니다.", "wrong_points": "- A: 16TB는 단일 File Storage 인스턴스의 최대 크기(쿼터)입니다. 프로젝트 전체의 총 할당 가능 용량이 아닙니다.\n- B: 32TB는 카카오클라우드 공식 문서에 언급되지 않는 수치입니다.\n- D: 100TB는 실제 프로젝트 총 할당 가능 용량(50TB)의 2배이며, 공식 문서에서 언급되지 않는 수치입니다."}, {"id": "q005", "chapter": "06-account", "chapter_name": "계정 관리", "topic": "service-account", "difficulty": 2, "question": "카카오클라우드 **서비스 계정(Service Account)**의 이메일 주소 형식으로 옳은 것은?", "choices": [{"label": "A", "text": "`{user-defined}@{project-name}.kakaocloud.com`"}, {"label": "B", "text": "`{user-defined}-{project-name}@kc.serviceaccount.com`"}, {"label": "C", "text": "`{project-name}-{user-defined}@kakao.com`"}, {"label": "D", "text": "`serviceaccount-{user-defined}@{org-name}.com`"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 서비스 계정의 이메일 주소 형식은 `{사용자 지정 이름}-{프로젝트 이름}@kc.serviceaccount.com`입니다. 예를 들어, 프로젝트 이름이 `myproject`이고 사용자 지정 이름이 `myservice`이면, 서비스 계정 이메일은 `myservice-myproject@kc.serviceaccount.com`이 됩니다.", "wrong_points": "- A: 이메일 형식에서 도메인은 `kakaocloud.com`이 아닌 `kc.serviceaccount.com`이며, 구분자는 `-`입니다.\n- C: 서비스 계정 이메일에서 프로젝트 이름은 앞이 아닌 뒤에 오며(`{user-defined}-{project-name}`), 도메인도 다릅니다.\n- D: 서비스 계정 이메일 형식에 조직 이름이 포함되지 않으며, 도메인은 `kc.serviceaccount.com`입니다."}, {"id": "q001", "chapter": "02-kakao-services/bns", "chapter_name": "BNS (네트워킹)", "topic": "vpc", "difficulty": 1, "question": "카카오클라우드 VPC에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "하나의 프로젝트에서 VPC를 최대 10개까지 생성할 수 있다."}, {"label": "B", "text": "VPC CIDR 블록은 생성 후에도 언제든지 수정할 수 있다."}, {"label": "C", "text": "VPC 하나에 여러 개의 CIDR 블록을 동시에 설정할 수 있다."}, {"label": "D", "text": "이미 생성된 VPC의 CIDR 정보는 수정할 수 없으며, 프로젝트별 최대 3개까지 생성 가능하다."}], "answer": "D", "explanation": "카카오클라우드 공식 문서에 따르면, 이미 생성된 VPC의 CIDR 정보는 수정할 수 없습니다. 또한 VPC 쿼터는 프로젝트별 최대 3개로, 추가가 필요한 경우 헬프데스크를 통해 증설 요청을 할 수 있습니다. VPC에는 하나의 CIDR 블록만 설정할 수 있습니다.", "wrong_points": "- A: VPC는 프로젝트별 최대 3개까지 생성할 수 있습니다. 10개가 아닙니다.\n- B: 이미 생성된 VPC의 CIDR 정보는 수정할 수 없습니다. CIDR 설계를 신중하게 해야 하는 이유입니다.\n- C: VPC에는 CIDR 블록을 1개만 설정할 수 있습니다. 여러 개를 동시에 설정하는 것은 지원되지 않습니다."}, {"id": "q001", "chapter": "04-security", "chapter_name": "보안 (IAM/Cloud Trail)", "topic": "iam-overview", "difficulty": 1, "question": "카카오클라우드 IAM(Identity and Access Management)에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "IAM은 클라우드 리소스의 성능을 모니터링하고 알림을 발송하는 서비스이다."}, {"label": "B", "text": "IAM은 역할 기반 접근 제어(RBAC)를 통해 사용자 또는 그룹 단위로 역할을 할당하여 리소스 접근 권한을 관리하는 서비스이다."}, {"label": "C", "text": "IAM은 사용자의 네트워크 트래픽을 분석하고 방화벽을 관리하는 보안 서비스이다."}, {"label": "D", "text": "IAM은 데이터베이스 접근을 제어하는 서비스로, 스토리지 서비스에만 적용된다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, IAM은 클라우드 리소스에 대한 접근 권한을 중앙에서 관리하는 서비스입니다. 사용자 또는 그룹 단위로 역할을 할당하고, 역할 기반 접근 제어(RBAC)를 통해 권한을 세분화하여 안전한 리소스 운영을 가능하게 합니다. IAM은 Beyond Compute, Networking, Storage, Container Pack, Billing 등 대부분의 카카오클라우드 서비스와 통합되어 무료로 제공됩니다.", "wrong_points": "- A: 리소스 성능 모니터링과 알림 발송은 IAM이 아닌 Monitoring 및 Alert Center 서비스의 역할입니다. IAM은 접근 권한 관리 서비스입니다.\n- C: 네트워크 트래픽 분석 및 방화벽 관리는 IAM의 역할이 아닙니다. 네트워크 보안은 VPC 보안 그룹 등을 통해 관리합니다.\n- D: IAM은 스토리지 서비스에만 적용되지 않습니다. Beyond Compute, Networking, Container Pack, Billing 등 대부분의 카카오클라우드 서비스에 적용됩니다."}, {"id": "q001", "chapter": "01-cloud-overview", "chapter_name": "클라우드 개요", "topic": "kakaocloud-overview", "difficulty": 1, "question": "카카오클라우드 API를 사용하기 위해 발급하는 API 인증 토큰의 기본 만료 시간으로 올바른 것은?", "choices": [{"label": "A", "text": "1시간"}, {"label": "B", "text": "6시간"}, {"label": "C", "text": "12시간"}, {"label": "D", "text": "24시간"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, API 인증 토큰은 기본적으로 발급 후 12시간이 경과하면 만료됩니다. 단, 12시간 이내라도 프로젝트 역할 변경, IAM 액세스 키 삭제 등의 특정 상황에서는 조기에 변경되거나 만료될 수 있습니다.", "wrong_points": "- A: 1시간은 일부 OAuth 서비스의 기본 만료 시간으로 혼동할 수 있지만, 카카오클라우드 API 인증 토큰의 기본 만료 시간은 12시간입니다.\n- B: 6시간은 공식 문서에 언급되지 않는 임의의 시간입니다.\n- D: 24시간은 기본 만료 시간보다 2배 긴 값으로, 보안상의 이유로 카카오클라우드는 더 짧은 12시간을 기본값으로 사용합니다."}, {"id": "q005", "chapter": "01-cloud-overview", "chapter_name": "클라우드 개요", "topic": "region-az", "difficulty": 2, "question": "카카오클라우드 VPC(Virtual Private Cloud)의 특징으로 옳은 것은?", "choices": [{"label": "A", "text": "VPC는 동일 프로젝트 내 다른 VPC와 네트워크가 자동으로 연결된다."}, {"label": "B", "text": "VPC는 논리적으로 격리되어 있으며, 다중 AZ를 통해 물리적으로도 분리되어 높은 가용성을 보장한다."}, {"label": "C", "text": "카카오클라우드에서 BCS 인스턴스를 생성할 때는 VPC 없이도 독립적으로 구성할 수 있다."}, {"label": "D", "text": "Transit Gateway 없이도 여러 VPC를 성능 저하 없이 유기적으로 연결할 수 있다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, VPC는 논리적으로 격리된 가상 네트워크이며, 다중 AZ(Multi Availability Zone)를 통해 물리적으로도 분리되어 높은 안정성과 가용성을 보장합니다. 이는 카카오클라우드의 핵심 네트워크 설계 원칙입니다.", "wrong_points": "- A: 카카오클라우드의 VPC는 기본적으로 논리적으로 격리되어 있어 같은 프로젝트 내에서도 VPC 간 자동 연결이 이루어지지 않습니다. VPC 간 연결을 위해서는 Transit Gateway 등의 별도 구성이 필요합니다.\n- C: BCS(Beyond Compute Service)의 경우에도 VPC와 같은 네트워크 연결이 반드시 필요합니다. VPC 없이 BCS 인스턴스를 독립적으로 구성하는 것은 불가능합니다.\n- D: 여러 VPC를 성능 저하 없이 유기적으로 연결하기 위해서는 Transit Gateway 서비스를 사용해야 합니다. Transit Gateway 없이는 복잡한 네트워크 설정과 성능 저하 문제가 발생할 수 있습니다."}, {"id": "q010", "chapter": "05-operations", "chapter_name": "운영 (모니터링/알림)", "topic": "maintenance", "difficulty": 1, "question": "카카오클라우드 **Maintenance** 서비스에 대한 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "Maintenance는 사용자 활동 이력을 자동으로 기록하는 감사(Audit) 서비스이다."}, {"label": "B", "text": "Maintenance는 인스턴스 및 엔진 업그레이드, OS 업데이트 등 주요 유지관리 작업을 원하는 일정에 맞춰 사전 스케줄링할 수 있는 서비스이다."}, {"label": "C", "text": "Maintenance는 실시간 트래픽 모니터링과 부하 분산을 자동화하는 서비스이다."}, {"label": "D", "text": "Maintenance는 데이터베이스 백업을 자동으로 수행하고 보관하는 서비스이다."}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Maintenance 서비스는 클라우드 PaaS 환경에서 서비스의 인스턴스 및 엔진의 업그레이드, OS 업데이트, 설정 변경 등 주요 유지관리 작업을 사용자가 원하는 일정에 맞춰 사전 스케줄링할 수 있도록 지원하는 서비스입니다. 이를 통해 계획적인 유지관리와 장애 예방으로 서비스 안정성과 운영 효율성을 높일 수 있습니다.", "wrong_points": "- A: 사용자 활동 이력을 자동으로 기록하는 감사 서비스는 Maintenance가 아닌 Cloud Trail입니다.\n- C: 실시간 트래픽 모니터링과 부하 분산 자동화는 Maintenance의 역할이 아닙니다. 부하 분산은 Load Balancing, 모니터링은 Monitoring 서비스의 역할입니다.\n- D: 데이터베이스 백업 자동화는 Maintenance가 아닌 각 데이터베이스 서비스(MySQL, PostgreSQL 등)에서 제공하는 백업 기능입니다."}, {"id": "q002", "chapter": "02-kakao-services/bns", "chapter_name": "BNS (네트워킹)", "topic": "vpc", "difficulty": 2, "question": "카카오클라우드에서 VPC를 생성할 때 **자동으로 함께 생성되는** 리소스로 옳은 것은?", "choices": [{"label": "A", "text": "기본 서브넷, 보안 그룹, 퍼블릭 IP"}, {"label": "B", "text": "기본 서브넷, 인터넷 게이트웨이, 기본 라우팅 테이블"}, {"label": "C", "text": "서브넷, NAT 게이트웨이, 보안 그룹"}, {"label": "D", "text": "인터넷 게이트웨이, 로드 밸런서, 기본 라우팅 테이블"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 카카오클라우드에서 생성되는 모든 VPC는 생성 시 기본 서브넷, 연결된 인터넷 게이트웨이, 모든 트래픽을 인터넷 게이트웨이로 보내는 기본 라우팅 테이블의 라우팅까지 함께 생성됩니다. 가용 영역에 생성된 기본 서브넷에 BCS 인스턴스를 생성하고 퍼블릭 IP를 연결하면 바로 인터넷에 액세스할 수 있습니다.", "wrong_points": "- A: 퍼블릭 IP는 VPC 생성 시 자동으로 생성되지 않습니다. 퍼블릭 IP는 별도로 생성하여 네트워크 인터페이스에 연결해야 합니다.\n- C: NAT 게이트웨이는 VPC 생성 시 자동으로 생성되지 않습니다. 프라이빗 서브넷에서 인터넷에 액세스하려면 NAT 인스턴스를 별도로 구성해야 합니다.\n- D: 로드 밸런서는 VPC 생성 시 자동으로 생성되지 않습니다. 트래픽 분산이 필요한 경우 Load Balancing 서비스를 별도로 사용해야 합니다."}, {"id": "q008", "chapter": "03-billing", "chapter_name": "과금 및 쿼터", "topic": "quota", "difficulty": 2, "question": "카카오클라우드 **Transit Gateway**의 프로젝트별 기본 생성 개수 쿼터로 옳은 것은?", "choices": [{"label": "A", "text": "1개 (증설 불가)"}, {"label": "B", "text": "3개 (증설 가능)"}, {"label": "C", "text": "5개 (증설 불가)"}, {"label": "D", "text": "10개 (증설 가능)"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, Transit Gateway는 프로젝트별로 최대 3개까지 생성할 수 있으며, 헬프데스크를 통해 증설 요청이 가능합니다. 또한 Attachment는 프로젝트별 15,000개, 라우팅 테이블은 60개로 제한되지만 이들은 증설 불가입니다.", "wrong_points": "- A: Transit Gateway의 기본 쿼터는 1개가 아닌 3개이며, 증설도 가능합니다.\n- C: 5개는 Kubernetes Engine 클러스터당 최대 BMS 노드 수입니다. Transit Gateway 기본 쿼터는 3개입니다.\n- D: Transit Gateway 기본 쿼터는 10개가 아닌 3개입니다. 증설이 가능하다는 점은 맞지만, 수량이 잘못되었습니다."}, {"id": "q004", "chapter": "02-kakao-services/container-pack", "chapter_name": "Container Pack", "topic": "kubernetes-overview", "difficulty": 2, "question": "카카오클라우드 Kubernetes Engine에서 지원하는 CNI 플러그인과 관련된 설명으로 옳은 것은?", "choices": [{"label": "A", "text": "Flannel과 Weave Net 두 가지 CNI 플러그인을 지원하며, 클러스터 생성 후에도 변경 가능하다."}, {"label": "B", "text": "Calico와 Cilium 두 가지 CNI 플러그인을 지원하며, 클러스터 생성 후에도 자유롭게 변경할 수 있다."}, {"label": "C", "text": "Calico와 Cilium 두 가지 CNI 플러그인을 지원하며, 클러스터 생성 시 선택한 CNI는 이후 변경할 수 없다."}, {"label": "D", "text": "CNI 플러그인은 카카오클라우드가 자동으로 선택하며, 사용자가 직접 선택할 수 없다."}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, Kubernetes Engine은 Calico와 Cilium 두 가지 CNI(Container Network Interface) 플러그인을 지원합니다. 클러스터 생성 시 CNI 플러그인을 선택할 수 있지만, 한번 선택한 CNI 플러그인은 클러스터 생성 이후 변경할 수 없습니다. 따라서 클러스터 생성 전 적절한 CNI를 신중하게 선택해야 합니다.", "wrong_points": "- A: Kubernetes Engine이 지원하는 CNI 플러그인은 Flannel과 Weave Net이 아니라 Calico와 Cilium입니다.\n- B: CNI 플러그인 선택지(Calico, Cilium)는 맞지만, 클러스터 생성 후에도 자유롭게 변경할 수 있다는 설명이 잘못되었습니다. CNI는 생성 후 변경이 불가능합니다.\n- D: CNI 플러그인은 클러스터 생성 시 사용자가 직접 선택합니다. 카카오클라우드가 자동으로 선택한다는 설명은 잘못되었습니다."}, {"id": "q002", "chapter": "07-complex", "chapter_name": "복합 시나리오", "topic": "quickstart", "difficulty": 2, "question": "카카오클라우드 빠른 시작 가이드에서 **프로젝트 생성** 이전에 완료해야 하는 단계로 옳은 것은?", "choices": [{"label": "A", "text": "VPC 생성"}, {"label": "B", "text": "사용자 등록 및 조직 역할 추가"}, {"label": "C", "text": "IAM 액세스 키 발급"}, {"label": "D", "text": "Kubernetes Engine 클러스터 생성"}], "answer": "B", "explanation": "카카오클라우드 공식 문서에 따르면, 빠른 시작 가이드의 순서는 계정 생성 → 결제 수단 등록 → **사용자 등록 및 조직 역할 추가** → 프로젝트 생성 및 프로젝트 역할 추가 → VPC 생성입니다. 따라서 프로젝트 생성 이전에 완료해야 하는 단계는 사용자 등록 및 조직 역할 추가입니다.", "wrong_points": "- A: VPC 생성은 프로젝트 생성 이후의 단계입니다. 프로젝트 생성 전에 수행하는 단계가 아닙니다.\n- C: IAM 액세스 키 발급은 빠른 시작 가이드의 기본 5단계에 포함되지 않으며, API 사용 준비를 위한 별도 작업입니다.\n- D: Kubernetes Engine 클러스터 생성은 빠른 시작 가이드의 기본 5단계에 포함되지 않는 서비스 활용 단계입니다."}, {"id": "q005", "chapter": "07-complex", "chapter_name": "복합 시나리오", "topic": "api-preparation", "difficulty": 3, "question": "카카오클라우드 API 인증 토큰 발급 **방법 2**에서 필요한 파라미터로 옳은 것은?", "choices": [{"label": "A", "text": "IAM 액세스 키 ID, 보안 액세스 키"}, {"label": "B", "text": "IAM 액세스 키 이름, 보안 액세스 키"}, {"label": "C", "text": "IAM 액세스 키 이름, 보안 액세스 키, 사용자 UUID"}, {"label": "D", "text": "IAM 액세스 키 ID, 보안 액세스 키, 사용자 UUID"}], "answer": "C", "explanation": "카카오클라우드 공식 문서에 따르면, API 인증 토큰 발급 방법은 두 가지입니다. 방법 1은 **IAM 액세스 키 ID**와 **보안 액세스 키**를 사용하고, 방법 2는 **IAM 액세스 키 이름(name)**, **보안 액세스 키**, **사용자 UUID** 세 가지를 사용합니다. 방법 2에서는 액세스 키 ID 대신 이름을 사용하며, 사용자를 식별하기 위한 UUID가 추가로 필요합니다.", "wrong_points": "- A: IAM 액세스 키 ID와 보안 액세스 키는 방법 1에서 사용하는 파라미터입니다.\n- B: 방법 2에서는 보안 액세스 키 외에 사용자 UUID도 추가로 필요합니다. 이름과 보안 액세스 키만으로는 불충분합니다.\n- D: 방법 2에서는 IAM 액세스 키 ID가 아닌 IAM 액세스 키 이름(name)을 사용합니다. ID와 이름은 서로 다른 식별자입니다."}];
const TOTAL = QUESTIONS.length;
const LIMIT_SEC = 60 * 60;

let current = 0;
let answers = new Array(TOTAL).fill(null);
let timerInterval = null;
let elapsed = 0;
let submitted = false;

// ── START ──
function startExam() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display  = 'block';
  document.getElementById('timer-wrap').style.display   = 'flex';
  buildNav();
  renderQuestion(0);
  startTimer();
}

// ── TIMER ──
function startTimer() {
  let remaining = LIMIT_SEC;
  const el = document.getElementById('timer');
  timerInterval = setInterval(() => {
    elapsed++;
    remaining--;
    const m = String(Math.floor(remaining / 60)).padStart(2,'0');
    const s = String(remaining % 60).padStart(2,'0');
    el.textContent = m + ':' + s;
    if (remaining <= 300) el.className = 'warning';
    if (remaining <= 60)  el.className = 'danger';
    if (remaining <= 0) {
      clearInterval(timerInterval);
      submitExam();
    }
  }, 1000);
}

// ── NAV GRID ──
function buildNav() {
  const g = document.getElementById('nav-grid');
  g.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const b = document.createElement('button');
    b.className = 'nav-btn' + (i === current ? ' current' : '');
    b.textContent = i + 1;
    b.onclick = () => goTo(i);
    g.appendChild(b);
  }
}

function updateNav() {
  const btns = document.getElementById('nav-grid').children;
  for (let i = 0; i < TOTAL; i++) {
    btns[i].className = 'nav-btn' +
      (answers[i] !== null ? ' answered' : '') +
      (i === current ? ' current' : '');
  }
  const cnt = answers.filter(a => a !== null).length;
  document.getElementById('answered-num').textContent = cnt;
  document.getElementById('progress-bar').style.width = (cnt / TOTAL * 100) + '%';
}

// ── RENDER QUESTION ──
function renderQuestion(idx) {
  current = idx;
  const q = QUESTIONS[idx];
  const userAns = answers[idx];
  const diffLabel = ['','기본','이해','응용'][q.difficulty] || '';
  const diffClass = 'diff-' + q.difficulty;

  let choicesHtml = q.choices.map(c => {
    const sel = userAns === c.label ? ' selected' : '';
    return `
      <label class="choice-label${sel}" id="cl-${c.label}" onclick="selectAnswer('${idx}','${c.label}')">
        <input type="radio" name="q${idx}" value="${c.label}"${userAns===c.label?' checked':''}>
        <span class="choice-letter">${c.label}</span>
        <span>${c.text}</span>
      </label>`;
  }).join('');

  document.getElementById('q-card').innerHTML = `
    <div class="q-meta">
      <span class="q-num">문제 ${idx + 1}</span>
      <span class="q-chapter">${q.chapter_name}</span>
      <span class="diff-dot ${diffClass}"></span>
      <span class="diff-label">${diffLabel}</span>
    </div>
    <div class="q-text">${md_to_html(q.question)}</div>
    <div class="choices">${choicesHtml}</div>
    <div class="explanation-box" id="exp-box"></div>
  `;

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent = idx === TOTAL - 1 ? '마지막 문제' : '다음 →';
  updateNav();
}

function md_to_html(t) {
  return t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.+?)`/g, '<code>$1</code>')
          .replace(/
/g, '<br>');
}

// ── SELECT ANSWER ──
function selectAnswer(idx, label) {
  if (submitted) return;
  answers[idx] = label;
  document.querySelectorAll(`#q-card .choice-label`).forEach(el => el.classList.remove('selected'));
  const sel = document.getElementById('cl-' + label);
  if (sel) sel.classList.add('selected');
  updateNav();
}

// ── NAVIGATION ──
function goTo(idx) { renderQuestion(idx); }
function goPrev() { if (current > 0) renderQuestion(current - 1); }
function goNext() { if (current < TOTAL - 1) renderQuestion(current + 1); }

// ── SUBMIT MODAL ──
function showSubmitModal() {
  const skip = answers.filter(a => a === null).length;
  const msg = skip > 0
    ? `<strong>${skip}개</strong> 문제에 아직 답하지 않았습니다.<br>제출 후에는 수정할 수 없습니다.`
    : `모든 문제에 답하셨습니다.<br>제출 후에는 수정할 수 없습니다.`;
  document.getElementById('modal-msg').innerHTML = msg;
  document.getElementById('submit-modal').classList.add('show');
}
function closeModal() {
  document.getElementById('submit-modal').classList.remove('show');
}

// ── SUBMIT ──
function submitExam() {
  closeModal();
  clearInterval(timerInterval);
  submitted = true;

  const elapsedMin = Math.floor(elapsed / 60);
  const elapsedSec = elapsed % 60;
  const timeStr = `${elapsedMin}분 ${elapsedSec}초`;

  let correct = 0;
  const chapterStats = {};

  QUESTIONS.forEach((q, i) => {
    const isCorrect = answers[i] === q.answer;
    if (isCorrect) correct++;
    if (!chapterStats[q.chapter]) {
      chapterStats[q.chapter] = { name: q.chapter_name, total: 0, correct: 0 };
    }
    chapterStats[q.chapter].total++;
    if (isCorrect) chapterStats[q.chapter].correct++;
  });

  const pct = Math.round(correct / TOTAL * 100);
  const pass = pct >= 70;

  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  document.getElementById('res-emoji').textContent   = pass ? '🎉' : '😢';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-correct2').textContent = correct;
  document.getElementById('res-wrong').textContent   = answers.filter((a,i) => a !== null && a !== QUESTIONS[i].answer).length;
  document.getElementById('res-skip').textContent    = answers.filter(a => a === null).length;
  document.getElementById('res-time').textContent    = timeStr;

  const badge = document.getElementById('pass-badge');
  badge.textContent = pass ? `합격 (${pct}%)` : `불합격 (${pct}%)`;
  badge.className   = 'pass-badge ' + (pass ? 'pass' : 'fail');

  // Chapter breakdown
  const cbRows = document.getElementById('cb-rows');
  cbRows.innerHTML = '';
  Object.values(chapterStats).forEach(ch => {
    const pctCh = Math.round(ch.correct / ch.total * 100);
    const barColor = pctCh >= 70 ? '#22c55e' : pctCh >= 50 ? '#f59e0b' : '#ef4444';
    cbRows.innerHTML += `
      <div class="cb-row">
        <div class="cb-meta">
          <span class="cb-name">${ch.name}</span>
          <span class="cb-fraction">${ch.correct}/${ch.total} (${pctCh}%)</span>
        </div>
        <div class="cb-bar-bg">
          <div class="cb-bar" style="width:${pctCh}%;background:${barColor}"></div>
        </div>
      </div>`;
  });

  // Wrong questions review
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';
  let wrongCount = 0;
  QUESTIONS.forEach((q, i) => {
    const isCorrect = answers[i] === q.answer;
    if (isCorrect) return;
    wrongCount++;
    const yourAns   = answers[i] ? `${answers[i]}. ${q.choices.find(c=>c.label===answers[i])?.text||'미응답'}` : '미응답';
    const correctAns = `${q.answer}. ${q.choices.find(c=>c.label===q.answer)?.text||''}`;
    reviewList.innerHTML += `
      <div class="review-card wrong-card">
        <div class="rc-top">
          <span class="rc-status wrong">오답</span>
          <span class="rc-qnum">문제 ${i+1}</span>
          <span class="rc-chapter">${q.chapter_name}</span>
        </div>
        <div class="rc-question">${md_to_html(q.question)}</div>
        <div class="rc-your-ans">
          <span class="label">내 답: </span><span style="color:#b91c1c;font-weight:600">${yourAns}</span><br>
          <span class="label">정답: </span><span style="color:#15803d;font-weight:600">${correctAns}</span>
        </div>
        <div class="rc-exp">${md_to_html(q.explanation)}</div>
      </div>`;
  });

  if (wrongCount === 0) {
    reviewList.innerHTML = '<div style="text-align:center;padding:32px;color:#15803d;font-weight:700;font-size:18px">🎊 모든 문제를 맞혔습니다!</div>';
  }

  document.getElementById('res-emoji').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
